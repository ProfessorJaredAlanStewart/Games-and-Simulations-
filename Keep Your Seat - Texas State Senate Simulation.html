<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keep Your Seat — Texas State Senate Simulation</title>
<style>
/* ============================================================
   KEEP YOUR SEAT v2.0 — Texas State Senate Simulation
   Standalone HTML • No External Dependencies • TCC Branded
   ============================================================ */

:root {
  /* TCC Brand */
  --tcc-navy: #0c2753;
  --tcc-blue: #2c74ae;
  --tcc-lime: #8dc63f;
  /* Political */
  --pol-blue: #002868;
  --pol-red: #bf0a30;
  --pol-red-light: #e51937;
  /* UI */
  --bg: #f4f5f7;
  --card: #ffffff;
  --border: #e2e5ea;
  --text: #1a1d23;
  --text-dim: #6b7280;
  --success: #0d7a3e;
  --success-bg: #d1fae5;
  --warning: #b45309;
  --warning-bg: #fef3c7;
  --danger: #b91c1c;
  --danger-bg: #fee2e2;
  --info-bg: #dbeafe;
  /* Spacing */
  --radius: 12px;
  --radius-sm: 8px;
  --radius-xs: 6px;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: Georgia, 'Times New Roman', serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.65;
  font-size: 16px;
  overflow-x: hidden;
}

h1, h2, h3, h4, h5, h6, button, .label, .badge, .stat-label, .advisor-name, .nav-btn, .metric-label {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

/* === UTILITY === */
.hidden { display: none !important; }
.text-center { text-align: center; }
.mb-1 { margin-bottom: 8px; }
.mb-2 { margin-bottom: 12px; }
.mb-3 { margin-bottom: 20px; }
.mb-4 { margin-bottom: 28px; }
.mt-2 { margin-top: 12px; }
.mt-3 { margin-top: 20px; }
.bold { font-weight: 700; }

/* === FIXED HEADER === */
.game-header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 900;
  background: linear-gradient(135deg, var(--tcc-navy), #0a3d6b, var(--tcc-blue));
  color: #fff;
  padding: 0 24px;
  height: 60px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 12px rgba(0,0,0,.2);
}
.game-header h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: .3px; }
.game-header .hdr-stats {
  display: flex; gap: 18px; align-items: center;
}
.hdr-stat {
  text-align: center; line-height: 1.2;
}
.hdr-stat .hdr-val { font-size: 1.15rem; font-weight: 800; }
.hdr-stat .hdr-lbl { font-size: .65rem; text-transform: uppercase; letter-spacing: .8px; opacity: .75; }
.hdr-round-pill {
  background: rgba(255,255,255,.18); padding: 4px 14px; border-radius: 20px;
  font-size: .8rem; font-weight: 600;
}
.hdr-actions-pill {
  background: var(--tcc-lime); color: var(--tcc-navy);
  padding: 4px 14px; border-radius: 20px; font-size: .8rem; font-weight: 700;
}

/* === CONTAINER === */
.container {
  max-width: 1100px; margin: 0 auto; padding: 80px 20px 40px;
}

/* === CARDS === */
.card {
  background: var(--card); border-radius: var(--radius);
  padding: 28px; margin-bottom: 20px;
  box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
  border: 1px solid var(--border);
}
.card-flush { padding: 0; overflow: hidden; }

/* === BUTTONS === */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px 24px; border: none; border-radius: var(--radius-sm);
  font-weight: 600; font-size: .95rem; cursor: pointer;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  transition: transform .15s, box-shadow .15s, background .2s;
}
.btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.12); }
.btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
.btn-primary { background: var(--tcc-navy); color: #fff; }
.btn-primary:hover:not(:disabled) { background: #091e42; }
.btn-success { background: var(--success); color: #fff; }
.btn-danger { background: var(--pol-red); color: #fff; }
.btn-warning { background: var(--warning); color: #fff; }
.btn-ghost {
  background: transparent; color: var(--tcc-navy); border: 2px solid var(--border);
}
.btn-ghost:hover:not(:disabled) { border-color: var(--tcc-navy); background: #f0f4f9; }
.btn-lg { padding: 16px 32px; font-size: 1.1rem; }
.btn-block { width: 100%; }
.btn-icon { width: 44px; height: 44px; padding: 0; border-radius: 50%; }

/* ============================================================
   SCREEN: TITLE / MENU
   ============================================================ */
.title-screen {
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: linear-gradient(170deg, #0a1628 0%, #0c2753 40%, #1a3a6a 70%, #2c74ae 100%);
  color: white; text-align: center; padding: 40px 20px;
  position: relative; overflow: hidden;
}
.title-screen::before {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 600px 300px at 50% 85%, rgba(191,10,48,.12), transparent),
    radial-gradient(ellipse 400px 400px at 20% 30%, rgba(44,116,174,.15), transparent);
  pointer-events: none;
}
.title-star {
  width: 120px; height: 120px; margin-bottom: 24px;
  animation: starPulse 3s ease-in-out infinite;
  filter: drop-shadow(0 0 30px rgba(255,215,0,.3));
}
@keyframes starPulse {
  0%, 100% { transform: scale(1); filter: drop-shadow(0 0 30px rgba(255,215,0,.3)); }
  50% { transform: scale(1.08); filter: drop-shadow(0 0 50px rgba(255,215,0,.5)); }
}
.title-main {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: clamp(2.5rem, 7vw, 4.2rem);
  font-weight: 800; letter-spacing: -1px; margin-bottom: 8px;
  text-shadow: 0 3px 20px rgba(0,0,0,.4);
  position: relative;
}
.title-sub {
  font-size: clamp(1rem, 3vw, 1.4rem);
  font-weight: 400; opacity: .85; margin-bottom: 12px;
  font-family: Georgia, serif; font-style: italic;
}
.title-tagline {
  font-size: 1.05rem; max-width: 500px; margin: 0 auto 36px;
  opacity: .7; line-height: 1.5;
}
.title-divider {
  width: 80px; height: 3px; background: var(--pol-red);
  margin: 0 auto 28px; border-radius: 2px;
}
.title-cta {
  background: linear-gradient(135deg, var(--pol-red), #d4213b);
  color: white; padding: 18px 48px; border: none; border-radius: var(--radius);
  font-size: 1.2rem; font-weight: 700; cursor: pointer;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  transition: transform .2s, box-shadow .2s;
  text-transform: uppercase; letter-spacing: 1.5px;
  box-shadow: 0 4px 20px rgba(191,10,48,.35);
  position: relative;
}
.title-cta:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(191,10,48,.45); }
.title-footer {
  margin-top: 48px; font-size: .8rem; opacity: .4;
}
.title-badge {
  display: inline-block; padding: 6px 16px; border-radius: 20px;
  background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15);
  font-size: .85rem; margin-bottom: 20px; font-weight: 500;
  backdrop-filter: blur(4px);
}

/* ============================================================
   SCREEN: DISTRICT SELECT
   ============================================================ */
.select-header {
  text-align: center; margin-bottom: 32px;
}
.select-header h2 { font-size: 2rem; color: var(--tcc-navy); margin-bottom: 8px; }
.select-header p { color: var(--text-dim); font-size: 1.05rem; }

.district-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}
.district-card {
  background: var(--card); border: 2px solid var(--border); border-radius: var(--radius);
  padding: 24px; cursor: pointer; transition: all .25s;
  position: relative; overflow: hidden;
}
.district-card:hover {
  border-color: var(--tcc-navy); transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(12,39,83,.12);
}
.district-card::after {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
}
.district-card.dem::after { background: linear-gradient(90deg, #0033a0, #0066cc); }
.district-card.rep::after { background: linear-gradient(90deg, var(--pol-red), var(--pol-red-light)); }
.district-name { font-size: 1.15rem; font-weight: 700; color: var(--tcc-navy); margin-bottom: 4px; }
.district-senator { font-size: .85rem; color: var(--text-dim); font-style: italic; margin-bottom: 8px; }
.district-desc { font-size: .9rem; color: var(--text-dim); margin-bottom: 12px; line-height: 1.5; }
.district-stats {
  display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: .82rem;
  margin-bottom: 12px;
}
.district-stats span { color: var(--text-dim); }
.district-stats strong { color: var(--text); }
.party-badge {
  display: inline-block; padding: 4px 14px; border-radius: 16px;
  font-size: .8rem; font-weight: 700; color: #fff; letter-spacing: .3px;
}
.party-badge.dem { background: linear-gradient(135deg, #0033a0, #0055cc); }
.party-badge.rep { background: linear-gradient(135deg, var(--pol-red), var(--pol-red-light)); }
.difficulty-tag {
  display: inline-block; padding: 3px 10px; border-radius: 12px;
  font-size: .72rem; font-weight: 600; margin-left: 8px;
  text-transform: uppercase; letter-spacing: .5px;
}
.diff-easy { background: var(--success-bg); color: var(--success); }
.diff-med { background: var(--warning-bg); color: var(--warning); }
.diff-hard { background: var(--danger-bg); color: var(--danger); }

/* ============================================================
   MAIN GAME UI
   ============================================================ */

/* --- Advisor Bar --- */
.advisor-bar {
  background: linear-gradient(135deg, #fef9e7, #fef3c7);
  border: 2px solid #f59e0b;
  border-radius: var(--radius); padding: 16px 20px;
  margin-bottom: 20px; display: flex; gap: 14px; align-items: flex-start;
  animation: advisorSlide .4s ease-out;
}
@keyframes advisorSlide {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}
.advisor-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: linear-gradient(135deg, var(--tcc-navy), var(--tcc-blue));
  color: #fff; display: flex; align-items: center; justify-content: center;
  font-size: .85rem; font-weight: 700; flex-shrink: 0;
}
.advisor-body { flex: 1; }
.advisor-name { font-size: .75rem; font-weight: 700; color: var(--warning); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.advisor-text { font-size: .95rem; color: #78350f; line-height: 1.55; }
.advisor-dismiss {
  background: none; border: none; color: #b45309; cursor: pointer;
  font-size: 1.2rem; padding: 4px; line-height: 1; flex-shrink: 0; opacity: .6;
}
.advisor-dismiss:hover { opacity: 1; }

/* --- Event Banner --- */
.event-banner {
  background: linear-gradient(135deg, #1e1b4b, #312e81);
  color: #fff; border-radius: var(--radius); padding: 20px 24px;
  margin-bottom: 20px; position: relative; overflow: hidden;
  animation: eventSlide .5s ease-out;
}
@keyframes eventSlide {
  from { opacity: 0; transform: scale(.96); }
  to { opacity: 1; transform: scale(1); }
}
.event-banner::before {
  content: ''; position: absolute; top: -50%; right: -10%; width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(245,158,11,.15), transparent);
  pointer-events: none;
}
.event-label {
  font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
  color: #fbbf24; margin-bottom: 8px;
}
.event-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 6px; }
.event-desc { font-size: .9rem; opacity: .8; line-height: 1.5; }
.event-effect {
  display: inline-block; margin-top: 10px; padding: 4px 12px;
  background: rgba(255,255,255,.12); border-radius: 14px;
  font-size: .8rem; font-weight: 600;
}

/* --- Session Banner --- */
.session-banner {
  display: flex; align-items: center; gap: 12px; padding: 10px 16px;
  border-radius: var(--radius-sm); margin-bottom: 16px; font-size: .88rem; font-weight: 600;
}
.session-active { background: linear-gradient(90deg, #065f46, #047857); color: #fff; }
.session-interim { background: #f3f4f6; color: var(--text-dim); border: 1px solid var(--border); }
.session-special { background: linear-gradient(90deg, #92400e, #b45309); color: #fff; animation: specialPulse 2s ease-in-out infinite; }
@keyframes specialPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(245,158,11,.3); }
  50% { box-shadow: 0 0 0 6px rgba(245,158,11,0); }
}

/* --- Approval Gauge --- */
.gauge-wrap {
  display: flex; flex-direction: column; align-items: center; padding: 20px 0;
}
.gauge-svg { width: 180px; height: 110px; }
.gauge-track { fill: none; stroke: #e5e7eb; stroke-width: 12; stroke-linecap: round; }
.gauge-fill { fill: none; stroke-width: 12; stroke-linecap: round; transition: stroke-dashoffset .8s ease, stroke .3s; }
.gauge-value {
  font-family: -apple-system, sans-serif; font-size: 2rem; font-weight: 800;
  fill: var(--text);
}
.gauge-label { font-family: -apple-system, sans-serif; font-size: .65rem; fill: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
.gauge-threshold { fill: none; stroke: var(--pol-red); stroke-width: 2; stroke-dasharray: 4 3; opacity: .5; }
.gauge-note { font-size: .78rem; color: var(--text-dim); margin-top: 8px; }

/* --- Stats Row --- */
.stats-row {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
  margin-top: 16px;
}
.stat-box {
  background: #f8f9fa; border-radius: var(--radius-sm); padding: 14px 12px;
  text-align: center; border: 1px solid var(--border);
}
.stat-label { font-size: .68rem; text-transform: uppercase; letter-spacing: .6px; color: var(--text-dim); font-weight: 600; margin-bottom: 4px; }
.stat-val { font-size: 1.35rem; font-weight: 800; }

/* --- Location Tabs --- */
.loc-tabs {
  display: flex; gap: 0; margin-bottom: 20px;
  border-radius: var(--radius); overflow: hidden; border: 2px solid var(--border);
}
.loc-tab {
  flex: 1; padding: 14px 20px; background: var(--card);
  border: none; cursor: pointer; text-align: center;
  font-family: -apple-system, sans-serif; font-size: .92rem; font-weight: 600;
  color: var(--text-dim); transition: all .2s;
}
.loc-tab + .loc-tab { border-left: 2px solid var(--border); }
.loc-tab.active-district {
  background: linear-gradient(135deg, #ecfdf5, #d1fae5);
  color: var(--success); border-bottom: 3px solid var(--success);
}
.loc-tab.active-capitol {
  background: linear-gradient(135deg, #eff6ff, #dbeafe);
  color: var(--pol-blue); border-bottom: 3px solid var(--pol-blue);
}
.loc-tab-icon { font-size: 1.3rem; display: block; margin-bottom: 4px; }
.loc-tab-label { font-size: .75rem; }

/* --- Action Cards --- */
.action-grid {
  display: grid; gap: 12px;
}
.action-grid-2 { grid-template-columns: 1fr 1fr; }
.action-grid-3 { grid-template-columns: 1fr 1fr 1fr; }
.action-grid-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }

.action-card {
  background: var(--card); border: 2px solid var(--border); border-radius: var(--radius);
  padding: 20px; text-align: center; cursor: pointer; transition: all .2s;
  position: relative;
}
.action-card:hover:not(.disabled) {
  border-color: var(--tcc-navy); transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(0,0,0,.08);
}
.action-card.disabled { opacity: .4; cursor: not-allowed; pointer-events: none; }
.action-icon { font-size: 2.2rem; margin-bottom: 8px; }
.action-title { font-weight: 700; font-size: .95rem; margin-bottom: 4px; }
.action-meta { font-size: .8rem; color: var(--text-dim); }
.action-cost { color: var(--success); font-weight: 700; }

/* --- Bill Cards --- */
.bill-card {
  background: var(--card); border: 2px solid var(--border); border-radius: var(--radius);
  padding: 20px; margin-bottom: 12px; transition: all .2s;
}
.bill-card.voted { border-color: var(--success); background: #f0fdf4; }
.bill-name { font-size: 1.05rem; font-weight: 700; margin-bottom: 6px; }
.bill-issue-tag {
  display: inline-block; padding: 2px 10px; border-radius: 12px;
  background: var(--info-bg); color: var(--pol-blue); font-size: .75rem;
  font-weight: 600; margin-bottom: 8px;
}
.bill-desc { font-size: .88rem; color: var(--text-dim); margin-bottom: 12px; line-height: 1.5; }
.bill-impacts {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
}
.bill-impact-btn {
  padding: 12px; border: 2px solid var(--border); border-radius: var(--radius-sm);
  background: var(--card); cursor: pointer; text-align: center;
  font-family: -apple-system, sans-serif; transition: all .2s;
}
.bill-impact-btn:hover:not(:disabled) { transform: translateY(-1px); }
.bill-impact-btn:disabled { opacity: .4; cursor: not-allowed; }
.bill-impact-btn.with:hover:not(:disabled) { border-color: var(--success); background: var(--success-bg); }
.bill-impact-btn.against:hover:not(:disabled) { border-color: var(--danger); background: var(--danger-bg); }
.impact-label { font-weight: 700; font-size: .9rem; margin-bottom: 4px; }
.impact-detail { font-size: .75rem; color: var(--text-dim); }
.impact-numbers { font-size: .8rem; font-weight: 600; margin-top: 4px; }
.impact-pos { color: var(--success); }
.impact-neg { color: var(--danger); }

/* --- Committee Cards --- */
.comm-card {
  background: var(--card); border: 2px solid var(--border); border-radius: var(--radius-sm);
  padding: 16px; text-align: center; cursor: pointer; transition: all .2s;
}
.comm-card:hover:not(.disabled):not(.joined) { border-color: var(--tcc-blue); transform: translateY(-1px); }
.comm-card.disabled { opacity: .4; cursor: not-allowed; }
.comm-card.joined { border-color: var(--success); background: #f0fdf4; }
.comm-tier { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.tier-1 { color: var(--text-dim); }
.tier-2 { color: var(--tcc-blue); }
.tier-3 { color: #7c3aed; }
.comm-name { font-weight: 700; font-size: .9rem; margin-bottom: 4px; }
.comm-req { font-size: .75rem; color: var(--text-dim); }

/* --- Fundraising --- */
.fund-card {
  background: var(--card); border: 2px solid var(--border); border-radius: var(--radius-sm);
  padding: 16px; text-align: center; cursor: pointer; transition: all .2s;
}
.fund-card:hover:not(.disabled) { border-color: var(--success); transform: translateY(-1px); }
.fund-card.disabled { opacity: .4; cursor: not-allowed; }
.fund-name { font-weight: 700; font-size: .85rem; margin-bottom: 2px; }
.fund-amount { font-size: 1.1rem; font-weight: 800; color: var(--success); margin-bottom: 2px; }
.fund-desc { font-size: .75rem; color: var(--text-dim); }

/* --- Inline Feedback --- */
.feedback-card {
  border-radius: var(--radius); padding: 20px; margin-bottom: 16px;
  animation: feedbackIn .35s ease-out;
  position: relative;
}
@keyframes feedbackIn {
  from { opacity: 0; transform: translateY(-8px) scale(.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.feedback-success { background: var(--success-bg); border-left: 4px solid var(--success); }
.feedback-warning { background: var(--warning-bg); border-left: 4px solid var(--warning); }
.feedback-danger { background: var(--danger-bg); border-left: 4px solid var(--danger); }
.feedback-info { background: var(--info-bg); border-left: 4px solid var(--pol-blue); }
.feedback-title { font-weight: 700; margin-bottom: 6px; font-size: 1rem; }
.feedback-body { font-size: .9rem; line-height: 1.55; }
.feedback-stats {
  display: flex; gap: 16px; margin-top: 10px; flex-wrap: wrap;
}
.feedback-stat {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: .85rem; font-weight: 600;
  padding: 4px 10px; border-radius: 14px; background: rgba(255,255,255,.5);
}

/* --- Media Panel --- */
.media-panel { margin-bottom: 20px; }
.media-headline {
  background: linear-gradient(135deg, #1e293b, #334155);
  color: #fff; border-radius: var(--radius-sm); padding: 14px 18px;
  margin-bottom: 10px;
}
.media-source { font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin-bottom: 4px; }
.media-text { font-size: .95rem; font-weight: 600; line-height: 1.4; }
.media-tweets {
  background: #f0f4f8; border-radius: var(--radius-sm); padding: 14px 18px;
}
.tweet {
  font-size: .85rem; padding: 6px 0; border-bottom: 1px solid var(--border);
  line-height: 1.4; color: #334155;
}
.tweet:last-child { border-bottom: none; }
.tweet-handle { color: var(--tcc-blue); font-weight: 600; }

/* --- End Round --- */
.end-round-bar {
  position: sticky; bottom: 0; left: 0; right: 0; z-index: 50;
  background: rgba(255,255,255,.92); backdrop-filter: blur(12px);
  border-top: 1px solid var(--border); padding: 16px 20px;
  margin: 20px -20px -40px;
  text-align: center;
}

/* --- Activity Log --- */
.log-list { max-height: 200px; overflow-y: auto; }
.log-item {
  padding: 10px 14px; margin-bottom: 6px; border-radius: var(--radius-xs);
  font-size: .85rem; border-left: 3px solid;
}
.log-success { background: var(--success-bg); border-left-color: var(--success); color: #065f46; }
.log-warning { background: var(--warning-bg); border-left-color: var(--warning); color: #92400e; }

  if (S.ltGov >= -10) return { label:"On Thin Ice", icon:"\u26A0\uFE0F", cls:"impact-neg" };
  return { label:"Blacklisted", icon:"\u{1F6A8}", cls:"impact-neg" };
}

function getAdvisorMessage() {

    if (a === 2 && S.location === 'district') return "Nice work helping constituents! Now click the \"The Capitol\" tab below (the one with the \u{1F3DB}\uFE0F icon) to switch locations. Once there, scroll down to the \"Vote on Bills\" section. Each bill shows two buttons side by side: a green \"WITH Leadership\" button and a red \"AGAINST\" button. The numbers on each show exactly what happens to your Lt. Gov influence and approval. Try voting WITH on a bill to start building the Lt. Governor's trust.";
    if (a === 2 && S.location === 'capitol') return "You're at the Capitol! Scroll down to the \"Vote on Bills\" section. Each bill has two buttons showing the exact impact: green \"WITH Leadership\" (builds Lt. Gov influence) and red \"AGAINST\" (costs influence but may help approval). You can hover over any bill name to see a full strategic breakdown of how it affects your district. Pick a bill and click one of the two buttons to cast your vote!";
    if (a === 1) {
      if (S.location === 'capitol') {
        return "Last action of Round 1! Click the \"District Office\" tab below to switch back to your district. Once there, scroll past the Campaign & Outreach cards (TV Ads, Digital, Radio, Speech) and past the Casework button. Below all of that is the \"Fundraising\" section \u2014 you'll see a grid of interest groups like Texas Oil & Gas PAC, Texas Business Coalition, and others. Click any group card to accept their donation. The green dollar amount shows what you'll receive. Build your war chest early \u2014 Texas has NO contribution limits!";
      }
      return "Last action of Round 1! Scroll down past the Campaign & Outreach cards (TV Ads, Digital, Radio, Speech) and past the orange Casework button. Below all of that is the \"Fundraising\" section \u2014 you'll see a grid of interest groups like Texas Oil & Gas PAC, Texas Business Coalition, and others. Click any group card to accept their donation. The green dollar amount shows what you'll receive. Build your war chest early \u2014 Texas has NO contribution limits!";

    if (a === 2) {
      if (S.location === 'capitol') return "Good work at the Capitol! Click the \"District Office\" tab below to switch back. From there you can: click the orange \"Casework\" button for guaranteed approval, click the \u{1F3A4} \"Public Speech\" card then pick an issue, or scroll down to \"Fundraising\" and click an interest group. Mix it up \u2014 a strong senator needs both district support AND Capitol power.";
      return "Good work! From your District Office you can: click the orange \"Casework\" button for guaranteed approval, click the \u{1F3A4} \"Public Speech\" card then pick an issue, or scroll down to \"Fundraising\" and click an interest group card. Try something different from last round \u2014 variety builds a well-rounded senator.";
    }

  if (r === 4 && a === 3 && S.ltGov >= 5) return "Milestone: Tier 2 committees are now unlocked! These include Border Security, Criminal Justice, and Business & Commerce. Check the Capitol for your options.";
  if (r === 4 && a === 3 && S.ltGov < 5) return "Tier 2 committees unlock this round, but you need Lt. Gov influence \u22655 to join. You're at " + S.ltGov + ". Focus on voting with leadership or joining remaining Tier 1 committees.";

  if (r === 10 && a === 3) return "Three rounds to the election! Your approval is " + S.approval + "% with +" + S.incumbency + "% incumbency bonus = " + (S.approval + S.incumbency) + "% effective. " + ((S.approval + S.incumbency) >= 50 ? "You're on track to win!" : "You need to push above 50% — focus on approval-boosting actions.");
  if (r === 12 && a === 3) return "FINAL ROUND! This is it, Senator. Make every action count. Your effective approval is " + (S.approval + S.incumbency) + "%. " + ((S.approval + S.incumbency) >= 50 ? "Stay the course!" : "You need a strong finish to survive Election Day.");

  // Primary threat — only show if actually threatened AND ltGov is still low
  if (S.primaryThreat && S.ltGov < 10 && a === 3) return "\u26A0\uFE0F The Lt. Gov is backing a primary challenger. Rebuild influence above 10 by voting with leadership, or ensure your approval stays above 55% to survive the challenge.";

  // Low approval emergency
  if (S.approval < 38 && a === 3) return "Your approval is dangerously low at " + S.approval + "%. Focus on casework and speeches on popular issues. Every point matters.";

  // Session awareness
  if (!S.sessionActive && !S.specialSession && S.location === 'capitol' && a === 3) return "The Legislature isn't in session right now. Switch to your District Office — casework, speeches, and fundraising don't require a session.";

function getSessionLabel() {
  if (S.sessionActive) return { text:"Regular Session (140 days)", cls:"session-active", icon:"\u{1F3DB}\uFE0F" };
  if (S.specialSession) return { text:"SPECIAL SESSION (30 days)", cls:"session-special", icon:"\u{1F4E2}" };
  return { text:"Interim Period \u2014 No Legislation", cls:"session-interim", icon:"\u{1F4C5}" };
}

// ── ACTIONS ───────────────────────────────────────────────────

function checkPrimaryThreat() {
  // Primary threat triggers at ltGov < -10, clears at ltGov >= 10
  if (S.primaryThreat && S.ltGov >= 10) {
    S.primaryThreat = false;
    addLog("Primary challenge withdrawn — Lt. Gov satisfied with your loyalty.", 'success');
  }
}

function selectDistrict(d) {
  S.district = d;
  S.screen = 'playing';
  calcApprovalBounds();
  const startApproval = d.lean.startsWith(d.party[0]) ? 60 : (d.lean === 'Competitive' ? 50 : 45);
  S.approval = constrainApproval(startApproval);
  S.approvalHistory = [S.approval];
  S.energy = d.industries.some(i => i.includes('Oil') || i.includes('Energy Sector') || i.includes('Energy HQ')) ? 70 :
             d.industries.some(i => i.includes('Wind') || i.includes('Tech')) ? 30 : 50;
  S.issueOwnership = {};
  ISSUES.forEach(iss => {
    const isLib = ['education','healthcare','environment','tech'].includes(iss.id);
    if ((isLib && d.party === 'Democrat') || (!isLib && d.party === 'Republican')) {
      S.issueOwnership[iss.id] = 5;
    }
  });
  S.headlines = ["New Senator takes office representing " + d.name];
  S.tweets = ["Welcome to the Texas Senate! \u{1F920}"];
  addLog("You now represent " + d.name + "!", 'success');
  S.advisorDismissed = false;
  render();
}

function doVote(bill, withLeadership) {
  if (S.actions <= 0 || S.votedBills.includes(bill.id)) return;
  if (!S.sessionActive && !S.specialSession) return;

  const ltChange = withLeadership ? bill.ltGovGain : -Math.floor(bill.ltGovGain * 1.5);
  const billAligned = (bill.liberal && S.district.party === 'Democrat') || (!bill.liberal && S.district.party === 'Republican');
  let appChange = withLeadership ? (billAligned ? 2 : -3) : (billAligned ? -2 : 3);
  if (bill.bipartisan) appChange = withLeadership ? 2 : -1;
  if (bill.id === 1 && S.district.industries.includes('Agriculture')) appChange = withLeadership ? -5 : 3;
  if (S.roundEventMod.modAll) { /* extra lt gov */ }

  S.ltGov += ltChange;
  S.approval = constrainApproval(S.approval + appChange);
  S.actions--;
  S.votedBills.push(bill.id);
  S.voteHistory.push({ billId:bill.id, billName:bill.name, withLeadership, round:S.round });

  if (ltChange < -10 && !S.primaryThreat) {
    S.primaryThreat = true;
    addLog("Lt. Gov threatens primary challenge!", 'warning');
  }

  const headline = "Sen. " + S.district.senator.split(' ').pop() + " votes " + (withLeadership ? "WITH" : "AGAINST") + " leadership on " + bill.name;
  S.headlines.push(headline);
  S.tweets.push(appChange > 0 ? "Finally someone with Texas values! #TexasStrong" : "Not what we voted for. #PrimaryThem");

  addLog("Voted " + (withLeadership?"WITH":"AGAINST") + " on " + bill.name, ltChange >= 0 ? 'success' : 'warning');

  let leaderReaction = '';
  if (ltChange < -10) leaderReaction = "Lt. Gov Patrick: \"You're crossing me. I control your committees and your future.\"";
  else if (ltChange > 10) leaderReaction = "Lt. Gov Patrick: \"Excellent loyalty. You have a bright future.\"";

  showFeedback(
    (withLeadership ? "Voted WITH Leadership" : "Voted AGAINST Leadership") + ": " + bill.name,
    (leaderReaction ? leaderReaction + " " : "") + bill.description,
    ltChange >= 0 ? 'success' : 'warning',
    [
      { label:"Lt. Gov", val:(ltChange>=0?"+":"")+ltChange, cls:ltChange>=0?"impact-pos":"impact-neg" },
      { label:"Approval", val:(appChange>=0?"+":"")+appChange+"%", cls:appChange>=0?"impact-pos":"impact-neg" }
    ]
  );
}

function doCasework() {
  if (S.actions <= 0) return;
  let gain = 2 + Math.floor(S.incumbency / 2);
  if (S.roundEventMod.modCasework) gain += S.roundEventMod.modAmount;
  S.approval = constrainApproval(S.approval + gain);
  S.casework++;
  S.actions--;
  S.headlines.push("Senator helps constituents with state services");
  S.tweets.push("Thank you Senator for helping with my property tax appeal! \u{1F64F}");
  addLog("Casework complete. Approval +" + gain + "%", 'success');
  showFeedback("Constituent Service Complete", "You helped a resident navigate state services. This builds lasting goodwill in your district.", 'success',
    [{ label:"Approval", val:"+" + gain + "%", cls:"impact-pos" }, { label:"Total Cases", val:S.casework, cls:"" }]
  );
}

function doFundraise(group) {
  if (S.actions <= 0) return;
  const impact = calcImpact(group.issue);
  let amount = group.amount;
  if (S.roundEventMod.bonusCash && group.issue === S.roundEventMod.modIssue) amount += S.roundEventMod.bonusCash;
  S.money += amount;
  S.approval = constrainApproval(S.approval + impact);
  S.actions--;
  if (group.issue === 'energy') S.energy = clamp(S.energy + (group.liberal ? -5 : 5), 0, 100);
  S.headlines.push("Senator receives support from " + group.name);
  addLog("Raised $" + amount.toLocaleString() + " from " + group.name, impact >= 0 ? 'success' : 'warning');
  showFeedback("Fundraising: " + group.name, "You raised $" + amount.toLocaleString() + ". Remember: no contribution limits in Texas!", impact >= 0 ? 'success' : 'warning',
    [{ label:"Funds", val:"+$" + (amount/1000) + "K", cls:"impact-pos" }, { label:"Approval", val:(impact>=0?"+":"") + impact + "%", cls:impact>=0?"impact-pos":"impact-neg" }]
  );
}

function doAd(adType, issueId) {
  if (S.actions <= 0 || S.money < adType.cost) return;
  const baseImpact = calcImpact(issueId);
  const impact = Math.round(baseImpact * adType.mult);
  S.money -= adType.cost;
  S.approval = constrainApproval(S.approval + impact);
  S.actions--;
  if (impact > 0 && S.issueOwnership[issueId] !== undefined) {
    S.issueOwnership[issueId] = Math.min(10, (S.issueOwnership[issueId]||0) + 1);
  }
  const issueData = ISSUES.find(i => i.id === issueId);
  S.headlines.push("Senator launches " + adType.name + " campaign on " + (issueData?.name || "key issues"));
  addLog(adType.name + " ads on " + (issueData?.name||"") + ". Cost $" + adType.cost.toLocaleString(), impact >= 0 ? 'success' : 'warning');
  S.adMode = null; S.selectedIssue = null;
  showFeedback(adType.name + " Campaign: " + (issueData?.name||""), "Texas media markets are expensive, but your message reached voters.", impact >= 0 ? 'success' : 'warning',
    [{ label:"Cost", val:"-$"+(adType.cost/1000)+"K", cls:"impact-neg" }, { label:"Approval", val:(impact>=0?"+":"")+impact+"%", cls:impact>=0?"impact-pos":"impact-neg" }]
  );
}

function doSpeech(issueId) {
  if (S.actions <= 0) return;
  const impact = calcImpact(issueId);
  const bonus = S.issueOwnership[issueId] ? 1 : 0;
  const total = impact + bonus;
  S.approval = constrainApproval(S.approval + total);
  S.ltGov += 3;
  S.actions--;
  const issueData = ISSUES.find(i => i.id === issueId);
  S.headlines.push("Senator addresses " + (issueData?.name||"key issues") + " at town hall");
  S.tweets.push(total > 0 ? "Great speech! Real Texas leadership!" : "All talk, no action...");
  addLog("Speech on " + (issueData?.name||"") + ". Approval " + (total>=0?"+":"") + total + "%, Lt.Gov +3", total >= 0 ? 'success' : 'warning');
  S.speechMode = false; S.selectedIssue = null;
  showFeedback("Public Speech: " + (issueData?.name||""), "You addressed constituents on the issues they care about.", total >= 0 ? 'success' : 'info',
    [{ label:"Approval", val:(total>=0?"+":"")+total+"%", cls:total>=0?"impact-pos":"impact-neg" }, { label:"Lt. Gov", val:"+3", cls:"impact-pos" }]
  );
}

function doCommittee(comm) {
  if (S.actions <= 0 || S.committees.includes(comm.name)) return;
  if (S.round < comm.minRound || S.ltGov < comm.minInfluence) return;
  S.committees.push(comm.name);
  S.ltGov += comm.ltGovGain;
  S.actions--;
  S.headlines.push("Sen. " + S.district.senator.split(' ').pop() + " joins " + comm.name + " Committee");
  addLog("Joined " + comm.name + ". Lt.Gov +" + comm.ltGovGain, 'success');
  showFeedback("Committee Assignment: " + comm.name, "The Lt. Governor appointed you to " + comm.name + ". " + (comm.tier === 3 ? "This is an elite committee \u2014 major power position!" : "Build influence to reach higher-tier committees."), 'success',
    [{ label:"Lt. Gov", val:"+" + comm.ltGovGain, cls:"impact-pos" }, { label:"Committees", val:S.committees.length, cls:"" }]
  );
}

function endRound() {
  if (S.actions > 0) return;
  if (S.round >= 12) {
    if (S.primaryThreat && S.approval < 60) { S.screen = 'primary'; }
    else { S.screen = 'election'; }
    render(); return;
  }

  S.approvalHistory.push(S.approval);
  const drift = rand(-1, 1) + (S.roundEventMod.modDrift ? rand(-2, 2) : 0);
  S.approval = constrainApproval(S.approval + drift);

  // Session management (every 6 rounds toggle)
  if (S.round % 6 === 0) {
    S.sessionActive = !S.sessionActive;
    addLog(S.sessionActive ? "New legislative session begins!" : "Session ended. Interim period.", 'info');
  }
  S.specialSession = false;
  if (!S.sessionActive && Math.random() < 0.3 && S.round > 3) {
    S.specialSession = true;
    addLog("Governor calls SPECIAL SESSION!", 'warning');
  }

  if (S.round % 3 === 0) {
    S.incumbency = Math.min(10, S.incumbency + 2);
    addLog("Incumbency advantage now +" + S.incumbency + "%", 'success');
  }

  S.round++;
  S.actions = 3;
  S.votedBills = [];
  S.feedback = null;
  S.advisorDismissed = false;
  S.adMode = null;
  S.speechMode = false;
  S.selectedIssue = null;

  // Generate event
  S.roundEventMod = {};
  if (S.round > 1 && Math.random() < 0.55) {
    S.currentEvent = pick(EVENTS);
    S.roundEventMod = {
      modIssue: S.currentEvent.modIssue,
      modAmount: S.currentEvent.modAmount,
      modAll: S.currentEvent.modAll,
      modCasework: S.currentEvent.modCasework,
      modDrift: S.currentEvent.modDrift,
      bonusCash: S.currentEvent.bonusCash
    };
  } else {
    S.currentEvent = null;
  }

  addLog("Round " + S.round + " begins (Months " + ((S.round-1)*2+1) + "-" + (S.round*2) + ")", 'info');
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function survivePrimary() {
  S.screen = 'election';
  render();
}

// ── RENDER ────────────────────────────────────────────────────

function render() {
  const app = $('app');
  if (S.screen === 'menu') { renderMenu(app); return; }
  if (S.screen === 'select') { renderSelect(app); return; }
  if (S.screen === 'primary') { renderPrimary(app); return; }
  if (S.screen === 'election') { renderElection(app); return; }
  if (S.screen === 'report') { renderReport(app); return; }
  renderGame(app);
}

        <h2>Choose Your Senate District</h2>
        <p>Each district offers different challenges based on real Texas political dynamics.</p>
      </div>
      <div class="district-grid">${cards}</div>
    </div>`;
}

// ── MAIN GAME ─────────────────────────────────────────────────

function renderGame(el) {
  const d = S.district;
  const session = getSessionLabel();
  const ltStatus = getLtGovStatus();
  const advisor = getAdvisorMessage();

  // Approval gauge SVG
  const gaugeArc = 251.2; // circumference of r=40 semicircle (pi * 80)
  const pct = (S.approval - S.approvalFloor) / (S.approvalCeiling - S.approvalFloor);
  const offset = gaugeArc * (1 - Math.max(0, Math.min(1, pct)));
  const gaugeColor = S.approval >= 55 ? '#0d7a3e' : S.approval >= 45 ? '#b45309' : '#b91c1c';
  // Threshold marker at 50%
  const thresh50 = (50 - S.approvalFloor) / (S.approvalCeiling - S.approvalFloor);

  let html = `
    <div class="game-header">
      <h1>${d.name}</h1>
      <div class="hdr-stats">
        <span class="hdr-round-pill">Round ${S.round}/12</span>
        <span class="hdr-actions-pill">${S.actions} Action${S.actions!==1?'s':''}</span>
        <div class="hdr-stat"><div class="hdr-val" style="color:#4ade80">$${(S.money/1000).toFixed(0)}K</div><div class="hdr-lbl">Funds</div></div>
        <div class="hdr-stat"><div class="hdr-val">${S.approval}%</div><div class="hdr-lbl">Approval</div></div>
        <div class="hdr-stat"><div class="hdr-val" style="color:${S.ltGov>=0?'#93c5fd':'#fca5a5'}">${S.ltGov}</div><div class="hdr-lbl">Lt.Gov</div></div>
      </div>
    </div>

    <div class="container anim-fade">`;

  // Event banner — visible all round so player can reference it
  if (S.currentEvent) {
    const boostedIssueName = S.roundEventMod.modIssue ? (ISSUES.find(i => i.id === S.roundEventMod.modIssue) || {}).name : null;
    html += `<div class="event-banner">
      <div class="event-label">\u26A1 Round ${S.round} Event</div>
      <div class="event-title">${S.currentEvent.title}</div>
      <div class="event-desc">${S.currentEvent.desc}</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;align-items:center">
        <div class="event-effect">${S.currentEvent.effect}</div>
        ${boostedIssueName ? '<div class="event-effect" style="background:rgba(245,158,11,.25);color:#fbbf24">\u{1F4FA} Ads &amp; speeches on ' + boostedIssueName + ' are boosted!</div>' : ''}
      </div>
    </div>`;
  }

  // Advisor
  if (advisor) {
    const isRoundOver = S.actions === 0;
    html += `<div class="advisor-bar" style="${isRoundOver ? 'border-color:#10b981;background:linear-gradient(135deg,#ecfdf5,#d1fae5)' : ''}">
      <div class="advisor-avatar">${isRoundOver ? '\u2705' : 'CoS'}</div>
      <div class="advisor-body">
        <div class="advisor-name" style="${isRoundOver ? 'color:#065f46' : ''}">Chief of Staff</div>
        <div class="advisor-text" style="${isRoundOver ? 'color:#065f46' : ''}">${advisor}</div>
      </div>
    </div>`;
  }

  // Feedback
  if (S.feedback) {
    const f = S.feedback;
    const statsHtml = (f.stats||[]).map(s => `<span class="feedback-stat ${s.cls}">${s.label}: ${s.val}</span>`).join('');
    html += `<div class="feedback-card feedback-${f.type}">
      <div class="feedback-title">${f.title}</div>
      <div class="feedback-body">${f.body}</div>
      ${statsHtml ? '<div class="feedback-stats">' + statsHtml + '</div>' : ''}
    </div>`;
  }

  // Session banner
  html += `<div class="session-banner ${session.cls}">${session.icon} Texas Senate: Republican Control (20-11) &bull; ${session.text}</div>`;

  // Main stats card
  html += `<div class="card">
    <div style="display:flex;align-items:center;gap:24px;flex-wrap:wrap;justify-content:center">
      <div class="gauge-wrap">
        <svg class="gauge-svg" viewBox="0 0 200 120">
          <path d="M 20 100 A 80 80 0 0 1 180 100" class="gauge-track"/>
          <path d="M 20 100 A 80 80 0 0 1 180 100" class="gauge-fill" stroke="${gaugeColor}"
            stroke-dasharray="${gaugeArc}" stroke-dashoffset="${offset}"/>
          <text x="100" y="88" text-anchor="middle" class="gauge-value">${S.approval}%</text>
          <text x="100" y="106" text-anchor="middle" class="gauge-label">Approval</text>
          <text x="22" y="116" text-anchor="start" style="font-size:.55rem;fill:#9ca3af;font-family:sans-serif">${S.approvalFloor}%</text>
          <text x="178" y="116" text-anchor="end" style="font-size:.55rem;fill:#9ca3af;font-family:sans-serif">${S.approvalCeiling}%</text>
        </svg>
        <div class="gauge-note">${ltStatus.icon} ${ltStatus.label} &bull; Need 50% to win</div>
      </div>
      <div style="flex:1;min-width:240px">
        <div class="stats-row">
          <div class="stat-box"><div class="stat-label">Funds</div><div class="stat-val" style="color:var(--success)">$${(S.money/1000).toFixed(0)}K</div></div>
          <div class="stat-box"><div class="stat-label">Lt. Gov</div><div class="stat-val" style="color:${S.ltGov>=0?'var(--pol-blue)':'var(--pol-red)'}">${S.ltGov}</div></div>
          <div class="stat-box"><div class="stat-label">Energy</div><div class="stat-val" style="color:var(--warning)">${S.energy}%</div></div>
          <div class="stat-box"><div class="stat-label">Casework</div><div class="stat-val">${S.casework}</div></div>
        </div>
        ${S.committees.length > 0 ? '<div style="margin-top:10px;font-size:.82rem;color:var(--text-dim)"><strong>Committees:</strong> ' + S.committees.join(', ') + '</div>' : ''}
        ${S.primaryThreat ? '<div style="margin-top:8px;padding:6px 12px;background:var(--danger-bg);border-radius:6px;font-size:.85rem;color:var(--danger);font-weight:600">\u26A0\uFE0F Primary Challenge Threatened!</div>' : ''}
      </div>
    </div>
  </div>`;

  // Location tabs
  html += `<div class="loc-tabs no-print">
    <button class="loc-tab ${S.location==='district'?'active-district':''}" onclick="S.location='district';S.adMode=null;S.speechMode=false;S.selectedIssue=null;render()">
      <span class="loc-tab-icon">\u{1F3D8}\uFE0F</span><span class="loc-tab-label">District Office</span>
    </button>
    <button class="loc-tab ${S.location==='capitol'?'active-capitol':''}" onclick="S.location='capitol';S.adMode=null;S.speechMode=false;S.selectedIssue=null;render()">
      <span class="loc-tab-icon">\u{1F3DB}\uFE0F</span><span class="loc-tab-label">The Capitol</span>
    </button>
  </div>`;

  // Location content
  if (S.location === 'district') {
    html += renderDistrictActions();
  } else {
    html += renderCapitolActions();
  }

  // Media panel
  const lastHeadline = S.headlines[S.headlines.length - 1] || '';
  const recentTweets = S.tweets.slice(-3);
  html += `<div class="media-panel">
    <div class="media-headline">
      <div class="media-source">Texas Tribune \u2022 Breaking</div>
      <div class="media-text">${lastHeadline}</div>
    </div>
    <div class="media-tweets">
      ${recentTweets.map(t => `<div class="tweet"><span class="tweet-handle">@texan${rand(100,999)}</span> ${t}</div>`).join('')}
    </div>
  </div>`;

  // Activity log toggle
  html += `<div class="card no-print">
    <div style="display:flex;align-items:center;justify-content:space-between;cursor:pointer" onclick="S.showLog=!S.showLog;render()">
      <h3 style="font-size:1rem;margin:0">Activity Log</h3>
      <span style="font-size:.85rem;color:var(--text-dim)">${S.showLog ? '\u25B2 Hide' : '\u25BC Show'}</span>
    </div>
    ${S.showLog ? '<div class="log-list" style="margin-top:12px">' + S.log.slice(0,12).map(l => `<div class="log-item log-${l.type}">R${l.round}: ${l.msg}</div>`).join('') + '</div>' : ''}
  </div>`;

  // End round bar
  html += `<div class="end-round-bar no-print">
    <button class="btn btn-primary btn-lg btn-block" ${S.actions > 0 ? 'disabled' : ''} onclick="endRound()">
      ${S.actions > 0 ? 'Complete ' + S.actions + ' more action' + (S.actions!==1?'s':'') : 'End Round \u2192 Advance to Round ' + (S.round + 1) + (S.round === 11 ? ' (ELECTION!)' : '')}
    </button>
  </div>`;

  // Hint button (fixed bottom-left)
  html += `<button class="hint-btn no-print" onclick="S.hintRequested=true;render()"><span class="hint-pulse"></span> Ask Chief of Staff</button>`;

  // Controls
  html += `<div class="controls-bar no-print">
    <button class="ctrl-btn ctrl-danger" onclick="if(confirm('Reset entire game?'))location.reload()">\u{1F534} Reset</button>
  </div>`;

  html += '</div>';
  el.innerHTML = html;
}

// ── DISTRICT ACTIONS PANEL ────────────────────────────────────

  let html = '';
  const disabled = S.actions <= 0 ? 'disabled' : '';

  // Ad/Speech mode
  if (S.adMode) {
    const at = S.adMode;
    html += `<div class="card"><div class="issue-overlay">
      <h3 style="font-size:1.05rem;margin-bottom:4px">Select Issue for ${at.name} ($${(at.cost/1000).toFixed(0)}K)</h3>
      <p style="font-size:.85rem;color:var(--text-dim);margin-bottom:12px">Choose the issue your ads will focus on.${S.roundEventMod.modIssue ? ' <strong style="color:#b45309">\u26A1 ' + ((ISSUES.find(x=>x.id===S.roundEventMod.modIssue)||{}).name||'') + ' is boosted by current events!</strong>' : ''}</p>
      <div class="issue-grid">
        ${ISSUES.map(i => `<button class="issue-btn ${S.selectedIssue===i.id?'selected':''} ${S.roundEventMod.modIssue===i.id?'boosted':''}" onclick="S.selectedIssue='${i.id}';render()">${i.icon} ${i.name}</button>`).join('')}

        <button class="btn btn-ghost" onclick="S.adMode=null;S.selectedIssue=null;render()">Cancel</button>
      </div>
    </div></div>`;
    return html;
  }

  if (S.speechMode) {
    html += `<div class="card"><div class="issue-overlay">
      <h3 style="font-size:1.05rem;margin-bottom:4px">Select Issue for Public Speech</h3>
      <p style="font-size:.85rem;color:var(--text-dim);margin-bottom:12px">Free action that also boosts Lt. Gov influence +3.${S.roundEventMod.modIssue ? ' <strong style="color:#b45309">\u26A1 ' + ((ISSUES.find(x=>x.id===S.roundEventMod.modIssue)||{}).name||'') + ' is boosted by current events!</strong>' : ''}</p>
      <div class="issue-grid">
        ${ISSUES.map(i => `<button class="issue-btn ${S.selectedIssue===i.id?'selected':''} ${S.roundEventMod.modIssue===i.id?'boosted':''}" onclick="S.selectedIssue='${i.id}';render()">${i.icon} ${i.name}</button>`).join('')}
      </div>
      <div style="display:flex;gap:10px;margin-top:16px">
        <button class="btn btn-primary" ${!S.selectedIssue?'disabled':''} onclick="doSpeech(S.selectedIssue)">Give Speech</button>
        <button class="btn btn-ghost" onclick="S.speechMode=false;S.selectedIssue=null;render()">Cancel</button>
      </div>
    </div></div>`;
    return html;
  }

  // Campaign & Outreach
  const boostedIssueObj = S.roundEventMod.modIssue ? ISSUES.find(i => i.id === S.roundEventMod.modIssue) : null;
  html += `<div class="card">
    <h3 style="font-size:1.1rem;margin-bottom:4px">\u{1F3D8}\uFE0F District Actions &mdash; Campaign & Outreach</h3>
    ${boostedIssueObj ? '<div style="display:inline-block;padding:4px 14px;border-radius:16px;background:linear-gradient(135deg,#fffbeb,#fef3c7);border:1px solid #f59e0b;font-size:.82rem;font-weight:600;color:#92400e;margin-bottom:12px">\u26A1 News Cycle: ' + boostedIssueObj.icon + ' ' + boostedIssueObj.name + ' ads &amp; speeches are boosted this round!</div>' : '<div style="margin-bottom:12px"></div>'}
    <div class="action-grid action-grid-4" style="margin-bottom:16px">
      ${AD_TYPES.map(a => `<div class="action-card ${S.actions<=0||S.money<a.cost?'disabled':''}" onclick="S.adMode=AD_TYPES.find(x=>x.id==='${a.id}');render()">
        <div class="action-icon">${a.icon}</div>
        <div class="action-title">${a.name}</div>
        <div class="action-meta action-cost">$${(a.cost/1000).toFixed(0)}K</div>
        <div class="action-meta">${a.desc} (${a.mult}x)</div>
      </div>`).join('')}
      <div class="action-card ${disabled}" onclick="S.speechMode=true;render()">
        <div class="action-icon">\u{1F3A4}</div>
        <div class="action-title">Public Speech</div>
        <div class="action-meta action-cost">Free</div>
        <div class="action-meta">+3 Lt. Gov</div>
      </div>

    <button class="btn btn-warning btn-block btn-lg" ${disabled} onclick="doCasework()" style="text-align:left;justify-content:flex-start;gap:16px">
      <span style="font-size:1.8rem">\u{1F91D}</span>
      <span><strong>Constituent Casework</strong> &mdash; Most reliable approval gain!<br><span style="font-size:.85rem;font-weight:400">Help with property taxes, permits, state services &bull; Approval +${2 + Math.floor(S.incumbency/2)}%</span></span>

  html += `<div class="card">

// ── CAPITOL ACTIONS PANEL ─────────────────────────────────────

function renderCapitolActions() {
  let html = '';
  const disabled = S.actions <= 0 ? 'disabled' : '';
  const canVote = S.sessionActive || S.specialSession;

  // Bills
  const availBills = BILLS.filter(b => {
    if (S.specialSession && b.special) return true;
    if (!canVote) return false;
    if (b.bipartisan) return true;
    if (!b.liberal) return true; // GOP controls
    return false;
  });

  html += `<div class="card">
    <h3 style="font-size:1.1rem;margin-bottom:4px">\u{1F5F3}\uFE0F Vote on Bills</h3>
    <p style="font-size:.85rem;color:var(--text-dim);margin-bottom:16px">Each vote affects your Lt. Governor standing and district approval. Choose wisely.</p>`;

  if (!canVote) {
    html += `<div style="padding:20px;background:var(--warning-bg);border-radius:var(--radius-sm);text-align:center;color:var(--warning);font-weight:600">
      Legislature not in session. No bills can be voted on during the interim period.
    </div>`;
  } else {
    availBills.forEach(bill => {
      const voted = S.votedBills.includes(bill.id);
      const ltWith = "+" + bill.ltGovGain;
      const ltAgainst = "-" + Math.floor(bill.ltGovGain * 1.5);
      const billAligned = (bill.liberal && S.district.party === 'Democrat') || (!bill.liberal && S.district.party === 'Republican');
      const appWith = bill.bipartisan ? "+2%" : (billAligned ? "+2%" : "-3%");
      const appAgainst = bill.bipartisan ? "-1%" : (billAligned ? "-2%" : "+3%");
      const issueData = ISSUES.find(i => i.id === bill.issue);

      // Compute district stance for tooltip
      const leanMatch = S.district.lean.match(/\d+/);
      const leanNum = leanMatch ? parseInt(leanMatch[0]) : 0;
      const isComp = S.district.lean === 'Competitive';
      let districtStance = 'Split Opinion (50/50)';
      if (!isComp) {
        if (billAligned || bill.bipartisan) {
          districtStance = leanNum > 15 ? 'Strong Support (75%+)' : leanNum > 5 ? 'Moderate Support (60-75%)' : 'Lean Support (55-60%)';
        } else {
          districtStance = leanNum > 15 ? 'Strong Opposition (75%+)' : leanNum > 5 ? 'Moderate Opposition (60-75%)' : 'Lean Opposition (55-60%)';
        }
      }
      const stratAdvice = billAligned ? 'Voting WITH leadership aligns with both your party and district.' :
        bill.bipartisan ? 'Bipartisan bill \u2014 low risk either way.' :
        'This bill conflicts with your district. Voting WITH costs approval but builds Lt. Gov power.';

      // Build vote buttons or voted indicator
      let voteArea = '';
      if (voted) {
        voteArea = '<div style="padding:16px;background:var(--success-bg);border-radius:8px;text-align:center;font-weight:600;color:var(--success)">\u2714 Already Voted</div>';
      } else {
        voteArea = '<div class="bill-impacts">' +
          '<button class="bill-impact-btn with" ' + disabled + ' onclick="doVote(BILLS.find(b=>b.id===' + bill.id + '),true)">' +
            '<div class="impact-label">\u2705 WITH Leadership</div>' +
            '<div class="impact-numbers"><span class="impact-pos">Lt.Gov ' + ltWith + '</span></div>' +
            '<div class="impact-numbers">Approval: ' + appWith + '</div>' +
          '</button>' +
          '<button class="bill-impact-btn against" ' + disabled + ' onclick="doVote(BILLS.find(b=>b.id===' + bill.id + '),false)">' +
            '<div class="impact-label">\u274C AGAINST</div>' +
            '<div class="impact-numbers"><span class="impact-neg">Lt.Gov ' + ltAgainst + '</span></div>' +
            '<div class="impact-numbers">Approval: ' + appAgainst + '</div>' +
          '</button>' +
        '</div>';
      }

      html += '<div class="bill-card ' + (voted?'voted':'') + '">' +
        '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap">' +
          '<div style="flex:1;min-width:220px" class="bill-tooltip-trigger">' +
            '<div class="bill-name">' + (voted ? '\u2714 ' : '') + bill.name + '</div>' +
            '<span class="bill-issue-tag">' + (issueData ? issueData.icon + ' ' + issueData.name : bill.issue) + '</span>' +
            '<div class="bill-desc">' + bill.description + '</div>' +
            '<div style="font-size:.78rem;color:var(--text-dim);margin-bottom:4px">' +
              '<strong>' + S.district.party + 's:</strong> ' + (S.district.party==='Democrat' ? bill.demSupport : bill.repSupport) +
            '</div>' +
            '<div style="font-size:.75rem;color:var(--tcc-blue);font-style:italic">\u{1F4A1} Hover for strategic analysis</div>' +
            '<div class="bill-tooltip-box">' +
              '<div class="tip-section"><div class="tip-label">Bill Summary</div>' + bill.description + '</div>' +
              '<div class="tip-section"><div class="tip-label">Your District (' + S.district.lean + ')</div>' + districtStance + '</div>' +
              '<div class="tip-section"><div class="tip-label">Democrats</div>' + bill.demSupport + '</div>' +
              '<div class="tip-section"><div class="tip-label">Republicans</div>' + bill.repSupport + '</div>' +
              '<div class="tip-section"><div class="tip-label">Strategic Advice</div>' + stratAdvice + '</div>' +
            '</div>' +
          '</div>' +
          '<div style="min-width:250px">' + voteArea + '</div>' +
        '</div>' +
      '</div>';
    });
  }
  html += '</div>';

  // Committees
  html += `<div class="card">
    <h3 style="font-size:1.1rem;margin-bottom:4px">\u{1F3DB}\uFE0F Join Committees</h3>
    <p style="font-size:.85rem;color:var(--text-dim);margin-bottom:16px">Lt. Governor controls ALL appointments. Build influence to unlock higher tiers.</p>
    <div class="action-grid action-grid-3">
      ${COMMITTEES.map(c => {
        const joined = S.committees.includes(c.name);
        const canJoin = !joined && S.round >= c.minRound && S.ltGov >= c.minInfluence;
        const tierCls = 'tier-' + c.tier;
        const tierLabel = c.tier === 3 ? '\u2B50 ELITE' : c.tier === 2 ? '\u{1F396}\uFE0F Important' : '\u{1F4CB} Regular';
        let reqText = '';
        if (!joined) {
          if (S.round < c.minRound) reqText = 'Need Round ' + c.minRound;
          else if (S.ltGov < c.minInfluence) reqText = 'Need Influence \u2265' + c.minInfluence + ' (have ' + S.ltGov + ')';
          else reqText = '\u2714 Eligible!';
        }
        return `<div class="comm-card ${joined?'joined':(!canJoin?'disabled':'')}" onclick="doCommittee(COMMITTEES.find(c=>c.name==='${c.name.replace(/'/g,"\\'")}'))">
          <div class="comm-tier ${tierCls}">${tierLabel}</div>
          <div class="comm-name">${c.name}</div>
          <div class="comm-req">${joined ? '\u2714 Member (+' + c.ltGovGain + ' Lt.Gov)' : reqText}</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;

  return html;
}

// ── PRIMARY SCREEN ────────────────────────────────────────────

function renderPrimary(el) {
  const survived = S.approval + S.incumbency >= 55;
  el.innerHTML = `
    <div class="container">
      <div class="election-screen"><div class="election-card anim-slide">
        <div class="election-result">\u2694\uFE0F</div>
        <div class="election-title" style="color:${survived?'var(--success)':'var(--danger)'}">
          ${survived ? 'Primary Survived!' : 'Primary Defeat'}
        </div>
        <div class="election-subtitle">${survived ?
          'Your incumbency advantage (+' + S.incumbency + '%) and ' + S.approval + '% approval were enough to fend off the challenger.' :
          'Lt. Gov Patrick backed your opponent. With only ' + S.approval + '% approval, you couldn\'t survive the challenge.'}</div>
        <div class="vote-bar-wrap">
          <div class="vote-bar-fill ${survived?'vote-bar-win':'vote-bar-lose'}" style="width:${Math.min(100, S.approval + S.incumbency)}%">
            ${S.approval + S.incumbency}%
          </div>
          <div class="vote-bar-marker"></div>
        </div>
        <button class="btn ${survived?'btn-primary':'btn-danger'} btn-lg btn-block" onclick="${survived ? 'survivePrimary()' : 'location.reload()'}">
          ${survived ? 'Continue to General Election \u2192' : 'Try Again'}
        </button>
      </div></div>
    </div>`;
  // Animate bar
  setTimeout(() => {
    const fill = el.querySelector('.vote-bar-fill');
    if (fill) fill.style.width = Math.min(100, S.approval + S.incumbency) + '%';
  }, 100);
}

// ── ELECTION SCREEN ───────────────────────────────────────────

function renderElection(el) {
  const total = S.approval + S.incumbency;
  const won = total >= 50;
  const partyVotes = S.voteHistory.filter(v => v.withLeadership).length;
  const loyalty = S.voteHistory.length > 0 ? Math.round((partyVotes / S.voteHistory.length) * 100) : 0;

  let strategy = "Balanced";
  if (loyalty > 80) strategy = "Party Loyalist";
  else if (loyalty < 40) strategy = "Independent Maverick";
  else if (S.committees.length >= 3) strategy = "Committee Power Broker";
  else if (S.casework > 15) strategy = "Constituent Champion";

  el.innerHTML = `
    <div class="container">
      <div class="election-screen"><div class="election-card anim-slide">
        <div class="election-result">${won ? '\u{1F920}' : '\u{1F614}'}</div>
        <div class="election-title" style="color:${won?'var(--success)':'var(--danger)'}">
          ${won ? 'Victory! You Kept Your Seat!' : 'Election Defeat'}
        </div>
        <div class="election-subtitle">${won ?
          'The people of ' + S.district.name + ' have returned you to Austin.' :
          'Your ' + total + '% wasn\'t enough. Time to become a lobbyist.'}</div>
        <div class="vote-bar-wrap">
          <div class="vote-bar-fill ${won?'vote-bar-win':'vote-bar-lose'}" style="width:0%">${total}%</div>
          <div class="vote-bar-marker"></div>
        </div>
        <div class="election-stats">
          <div class="election-stat"><div class="stat-val" style="color:${S.approval>=50?'var(--success)':'var(--danger)'}"> ${S.approval}%</div><div class="stat-label">Approval</div></div>
          <div class="election-stat"><div class="stat-val">+${S.incumbency}%</div><div class="stat-label">Incumbency</div></div>
          <div class="election-stat"><div class="stat-val">${loyalty}%</div><div class="stat-label">Party Loyalty</div></div>
        </div>
        <p style="font-size:.9rem;color:var(--text-dim);margin-bottom:24px">Strategy Profile: <strong>${strategy}</strong></p>
        <div style="display:flex;gap:12px;flex-wrap:wrap">
          <button class="btn btn-primary btn-lg" style="flex:1" onclick="S.screen='report';render()">View Completion Report</button>
          <button class="btn btn-ghost btn-lg" style="flex:1" onclick="location.reload()">Play Again</button>
        </div>
      </div></div>
    </div>`;
  // Animate vote bar
  setTimeout(() => {
    const fill = el.querySelector('.vote-bar-fill');
    if (fill) fill.style.width = Math.min(100, total) + '%';
  }, 200);
}

// ── REPORT SCREEN ─────────────────────────────────────────────

function renderReport(el) {
  const total = S.approval + S.incumbency;
  const won = total >= 50;
  const partyVotes = S.voteHistory.filter(v => v.withLeadership).length;
  const loyalty = S.voteHistory.length > 0 ? Math.round((partyVotes / S.voteHistory.length) * 100) : 0;
  // Score: composite of approval, ltGov, casework, committees, loyalty
  const maxScore = 100;
  const approvalScore = Math.min(30, Math.round((S.approval / 80) * 30));
  const ltGovScore = Math.min(20, Math.max(0, Math.round(((S.ltGov + 20) / 45) * 20)));
  const caseworkScore = Math.min(15, S.casework);
  const committeeScore = Math.min(15, S.committees.length * 5);
  const loyaltyScore = Math.min(10, Math.round(loyalty / 10));
  const moneyScore = Math.min(10, Math.round((S.money / 200000) * 10));
  const totalScore = approvalScore + ltGovScore + caseworkScore + committeeScore + loyaltyScore + moneyScore;
  const pct = Math.round((totalScore / maxScore) * 100);
  let grade, gradeColor;
  if (pct >= 90) { grade = 'A'; gradeColor = '#1B5E20'; }
  else if (pct >= 80) { grade = 'B'; gradeColor = '#00695C'; }
  else if (pct >= 70) { grade = 'C'; gradeColor = '#F57C00'; }
  else if (pct >= 60) { grade = 'D'; gradeColor = '#E65100'; }
  else { grade = 'F'; gradeColor = '#B71C1C'; }

  const nameInput = S.studentName ? S.studentName : '';
  const now = new Date();

  el.innerHTML = `
    <div class="container anim-fade">
      <div class="card card-flush">
        <div class="report-header-bar">
          <h2>\u{1F3DB}\uFE0F TCC Texas Government \u2014 Keep Your Seat</h2>
        </div>
        <div class="report-content">
          <button class="btn btn-ghost no-print mb-3" onclick="S.screen='election';render()">\u2190 Back to Results</button>

          <h2 class="text-center" style="font-size:1.4rem;margin-bottom:4px">TCC Trailblazer Trek &mdash; Simulation Report</h2>
          <p class="text-center" style="color:var(--text-dim);margin-bottom:20px">Keep Your Seat: Texas State Senate Simulation</p>

          <div class="report-grade-box" style="background:${gradeColor}">
            <div class="report-letter">${grade}</div>
            <div class="report-pct">${pct}%</div>
          </div>

          <div class="report-info-grid">
            <div class="report-section">
              <h4>Student Information</h4>
              <div class="report-row"><span>Name:</span><span><input id="nameInput" type="text" value="${nameInput}" placeholder="Enter your name" style="border:1px solid var(--border);padding:4px 8px;border-radius:4px;font-size:.9rem" onchange="S.studentName=this.value"></span></div>
              <div class="report-row"><span>Date:</span><span>${now.toLocaleDateString()}</span></div>
              <div class="report-row"><span>District:</span><span>${S.district.name}</span></div>
              <div class="report-row"><span>Party:</span><span>${S.district.party}</span></div>
              <div class="report-row"><span>Result:</span><span style="font-weight:700;color:${won?'var(--success)':'var(--danger)'}"> ${won ? 'RE-ELECTED' : 'DEFEATED'}</span></div>
            </div>
            <div class="report-section">
              <h4>Performance Breakdown</h4>
              <div class="report-row"><span>Approval (max 30)</span><span>${approvalScore}</span></div>
              <div class="report-row"><span>Lt. Gov Influence (max 20)</span><span>${ltGovScore}</span></div>
              <div class="report-row"><span>Casework (max 15)</span><span>${caseworkScore}</span></div>
              <div class="report-row"><span>Committees (max 15)</span><span>${committeeScore}</span></div>
              <div class="report-row"><span>Party Loyalty (max 10)</span><span>${loyaltyScore}</span></div>
              <div class="report-row"><span>Fiscal Management (max 10)</span><span>${moneyScore}</span></div>
              <div class="report-row" style="border-top:2px solid var(--border);padding-top:8px;font-weight:700"><span>TOTAL</span><span>${totalScore} / ${maxScore}</span></div>
            </div>
          </div>

          <div class="metrics-grid">
            <div class="metric-box"><div class="metric-val" style="color:${S.approval>=50?'var(--success)':'var(--danger)'}">${S.approval}%</div><div class="metric-label">Final Approval</div></div>
            <div class="metric-box"><div class="metric-val">${S.voteHistory.length}</div><div class="metric-label">Bills Voted</div></div>
            <div class="metric-box"><div class="metric-val">${S.committees.length}</div><div class="metric-label">Committees</div></div>
            <div class="metric-box"><div class="metric-val">${loyalty}%</div><div class="metric-label">Party Loyalty</div></div>
          </div>

          ${S.voteHistory.length > 0 ? `
          <div class="report-section" style="margin-bottom:20px">
            <h4>Vote Record</h4>
            ${S.voteHistory.map(v => `<div class="report-row"><span>${v.billName}</span><span style="font-weight:600;color:${v.withLeadership?'var(--success)':'var(--danger)'}">Voted ${v.withLeadership ? 'WITH' : 'AGAINST'} (R${v.round})</span></div>`).join('')}
          </div>` : ''}

          <div class="instructor-note">
            <strong>Instructor Note:</strong> This simulation teaches Texas legislative mechanics including the Lt. Governor's committee appointment power, biennial sessions, interest group fundraising, and the tension between party loyalty and constituent representation. The student's score reflects strategic decision-making across all dimensions of legislative service.
          </div>

          <div class="print-btn-wrap no-print">
            <div class="print-note">Screenshots will not be accepted as proof of completion.</div>
            <button class="btn btn-primary btn-lg" onclick="window.print()">
              \u{1F5A8}\uFE0F Download Completion Report (PDF)
            </button>
          </div>
        </div>
      </div>
    </div>`;
}

// ── INIT ──────────────────────────────────────────────────────
render();
</script>
</body>
</html>

  <script type="text/babel">
    // Texas State Senate Simulation Game
    function App() {
      // Game state
      const [gameState, setGameState] = React.useState('menu');
      const [selectedDistrict, setSelectedDistrict] = React.useState(null);
      const [round, setRound] = React.useState(1);
      const [actionsLeft, setActionsLeft] = React.useState(3);
      const [money, setMoney] = React.useState(100000);
      const [approval, setApproval] = React.useState(50);
      const [texasApproval, setTexasApproval] = React.useState(28);
      const [ltGovInfluence, setLtGovInfluence] = React.useState(0);
      const [energyInfluence, setEnergyInfluence] = React.useState(50);
      const [incumbencyBonus, setIncumbencyBonus] = React.useState(0);
      const [location, setLocation] = React.useState('district');
      const [gameLog, setGameLog] = React.useState([]);
      const [committees, setCommittees] = React.useState([]);
      const [primaryChallenge, setPrimaryChallenge] = React.useState(false);
      const [showModal, setShowModal] = React.useState(false);
      const [modalContent, setModalContent] = React.useState({ title: '', message: '' });
      const [headlines, setHeadlines] = React.useState(['New Senator Takes Office in Austin']);
      const [tweets, setTweets] = React.useState(['Welcome to the Texas Senate! 🤠']);
      const [showDashboard, setShowDashboard] = React.useState(false);
      const [showCharacters, setShowCharacters] = React.useState(false);
      const [showDistrictInfo, setShowDistrictInfo] = React.useState(false);
      const [approvalHistory, setApprovalHistory] = React.useState([50]);
      const [moneyHistory, setMoneyHistory] = React.useState([100000]);
      const [caseworkCount, setCaseworkCount] = React.useState(0);
      const [issueOwnership, setIssueOwnership] = React.useState({});
      const [votedBills, setVotedBills] = React.useState([]);
      const [selectedAdType, setSelectedAdType] = React.useState(null);
      const [selectedAdIssue, setSelectedAdIssue] = React.useState(null);
      const [selectedSpeechIssue, setSelectedSpeechIssue] = React.useState(null);
      const [showSpeechPanel, setShowSpeechPanel] = React.useState(false);
      const [lastAction, setLastAction] = React.useState(null);
      const [showSaveLoad, setShowSaveLoad] = React.useState(false);
      const [savedGames, setSavedGames] = React.useState([]);
      const [hoveredBill, setHoveredBill] = React.useState(null);
      const [voteHistory, setVoteHistory] = React.useState([]);
      const [legislatureControl, setLegislatureControl] = React.useState('rep');
      const [approvalFloor, setApprovalFloor] = React.useState(25);
      const [approvalCeiling, setApprovalCeiling] = React.useState(75);
      const [retrospectiveVoting, setRetrospectiveVoting] = React.useState(0);
      const [sessionActive, setSessionActive] = React.useState(true);
      const [specialSession, setSpecialSession] = React.useState(false);

      // Load saved games on mount
      React.useEffect(() => {
        const saves = [];
        for (let i = 1; i <= 3; i++) {
          const save = localStorage.getItem(`texasSenateGame_slot${i}`);
          if (save) {
            try {
              const data = JSON.parse(save);
              saves.push({ slot: i, data, timestamp: data.timestamp });
            } catch (e) {
              console.error('Failed to load save slot', i);
            }
          } else {
            saves.push({ slot: i, data: null, timestamp: null });
          }
        }
        setSavedGames(saves);
      }, []);

      // Calculate approval bounds based on district
      React.useEffect(() => {
        if (selectedDistrict) {
          const lean = parseInt(selectedDistrict.lean.match(/\d+/) || [0])[0];
          const isAligned = selectedDistrict.lean.startsWith(selectedDistrict.party[0]);
          
          if (isAligned) {
            if (lean > 15) {
              setApprovalFloor(35);
              setApprovalCeiling(80);
            } else if (lean > 5) {
              setApprovalFloor(30);
              setApprovalCeiling(75);
            } else {
              setApprovalFloor(25);
              setApprovalCeiling(70);
            }
          } else {
            if (lean > 15) {
              setApprovalFloor(15);
              setApprovalCeiling(55);
            } else if (lean > 5) {
              setApprovalFloor(20);
              setApprovalCeiling(60);
            } else {
              setApprovalFloor(25);
              setApprovalCeiling(65);
            }
          }
          
          if (selectedDistrict.lean === 'Competitive') {
            setApprovalFloor(20);
            setApprovalCeiling(70);
          }
        }
      }, [selectedDistrict]);

      const constrainApproval = (newApproval) => {
        return Math.max(approvalFloor, Math.min(approvalCeiling, newApproval));
      };

      // Function to reset the entire game
      const resetGame = () => {
        if (window.confirm('Reset entire game and start over? All progress will be lost.')) {
          window.location.reload();
        }
      };

      // Texas State Senate Districts (10 representative districts)
      const districts = [
        { 
          id: 6, 
          name: "SD-6 (East Houston)", 
          party: "Democrat", 
          lean: "D+30",
          primaryLean: "D+40",
          demographics: { hispanic: 72, white: 14, black: 10, asian: 3, medianIncome: 42000, population: 940000 },
          industries: ["Port Operations", "Petrochemicals", "Healthcare", "Construction"],
          description: "Working-class East Houston, heavily Hispanic, environmental justice concerns",
          senator: "Carol Alvarado"
        },
        { 
          id: 13, 
          name: "SD-13 (South Houston)", 
          party: "Democrat", 
          lean: "D+57",
          primaryLean: "D+65",
          demographics: { black: 40, hispanic: 39, white: 11, asian: 10, medianIncome: 45000, population: 940000 },
          industries: ["Energy", "Healthcare", "Transportation", "Small Business"],
          description: "Historic African American neighborhoods, strongest Democratic district",
          senator: "Borris Miles"
        },
        { 
          id: 14, 
          name: "SD-14 (Austin/Travis)", 
          party: "Democrat", 
          lean: "D+51",
          primaryLean: "D+60",
          demographics: { white: 48, hispanic: 34, asian: 9, black: 7, medianIncome: 75000, population: 940000 },
          industries: ["Technology", "State Government", "Education (UT)", "Creative Industries"],
          description: "Progressive Austin, tech workers, university community",
          senator: "Sarah Eckhardt"
        },
        { 
          id: 7, 
          name: "SD-7 (NW Houston suburbs)", 
          party: "Republican", 
          lean: "R+10",
          primaryLean: "R+20",
          demographics: { white: 47, hispanic: 31, asian: 14, black: 6, medianIncome: 85000, population: 940000 },
          industries: ["Energy HQ", "Professional Services", "Healthcare", "Retail"],
          description: "Affluent Houston suburbs trending competitive",
          senator: "Paul Bettencourt"
        },
        { 
          id: 8, 
          name: "SD-8 (N Dallas suburbs)", 
          party: "Republican", 
          lean: "R+12",
          primaryLean: "R+22",
          demographics: { white: 52, hispanic: 19, asian: 17, black: 9, medianIncome: 92000, population: 940000 },
          industries: ["Corporate HQ", "Technology", "Finance", "Healthcare"],
          description: "Highly educated Dallas suburbs, Fortune 500 companies",
          senator: "Angela Paxton"
        },
        { 
          id: 27, 
          name: "SD-27 (Rio Grande Valley/Corpus)", 
          party: "Republican",

          if (lean.includes('Competitive')) {
            return 'Split Opinion (50/50)';
          } else if ((isLiberal && isDemDistrict) || (!isLiberal && !isDemDistrict)) {
            const strength = parseInt(lean.match(/\d+/) || [0])[0];
            if (strength > 15) return 'Strong Support (75%+)';
            if (strength > 5) return 'Moderate Support (60-75%)';
            return 'Lean Support (55-60%)';
          } else {
            const strength = parseInt(lean.match(/\d+/) || [0])[0];

          if (bill.special && specialSession) return "✔ Special session priority";

      const calculateImpact = (issue) => {
        if (!selectedDistrict) return 0;
        const issueData = issues.find(i => i.id === issue);
        const isAligned = (issueData?.liberal && selectedDistrict.party === 'Democrat') ||
                         (!issueData?.liberal && selectedDistrict.party === 'Republican');
        const isCompetitive = selectedDistrict.lean.includes('Competitive');
        let impact = isAligned ? (isCompetitive ? 2 : 3) : (isCompetitive ? -3 : -1);
        
        if (issueOwnership[issue]) {
          impact += Math.floor(issueOwnership[issue] / 3);
        }
        
        impact += retrospectiveVoting;
        
        // Special Texas modifiers
        if (issue === 'energy' && energyInfluence > 60) {
          impact += 2;
        } else if (issue === 'immigration' && selectedDistrict.demographics.hispanic > 70) {
          impact = Math.floor(impact * 0.5); // Hispanic districts more nuanced on immigration
        } else if (issue === 'education' && selectedDistrict.name.includes('rural')) {
          impact -= 2; // Rural areas hate vouchers
        }
        
        return impact;
      };

      const handleFundraising = (group) => {
        if (actionsLeft <= 0) return;
        
        saveActionState();
        
        const impact = calculateImpact(group.issues[0]);
        setMoney(prev => prev + group.amount);
        setApproval(prev => constrainApproval(prev + impact));
        setActionsLeft(prev => prev - 1);
        
        // Energy industry influence
        if (group.name.includes('Oil') || group.name.includes('Energy')) {
          setEnergyInfluence(prev => Math.min(100, prev + 5));
        } else if (group.name.includes('Green') || group.name.includes('Wind')) {
          setEnergyInfluence(prev => Math.max(0, prev - 5));
        }
        
        let reactions = '';
        if (impact < 0) {
          reactions = 'CONSTITUENTS: "Taking money from them? Really?"\n\n';
        } else {
          reactions = 'CONSTITUENTS: "Good to see support from aligned groups."\n\n';
        }
        
        const headline = generateHeadline('fundraising', { group: group.name });
        setHeadlines(prev => [...prev, headline].slice(-5));
        setTweets(prev => [...prev, generateTweet('fundraising', impact)].slice(-5));
        
        const explanation = 'Texas Campaign Finance:\n\n' + reactions +
          'You raised $' + group.amount.toLocaleString() + ' from ' + group.name + '.\n\n' +
          'Remember: No contribution limits in Texas!\n' +
          'Approval ' + (impact >= 0 ? '+' : '') + impact + '%';
        
        showExplanation('Fundraising Impact', explanation);
        addLog('Raised $' + group.amount + ' from ' + group.name + '. Approval ' + (impact >= 0 ? '+' : '') + impact + '%', 
               impact >= 0 ? 'success' : 'warning');

      const handleVote = (bill, withParty) => {
        if (actionsLeft <= 0) return;
        if (votedBills.includes(bill.id)) {
          showExplanation('Already Voted', 'You have already voted on this bill. Each senator only gets one vote per bill.');
          return;
        }
        
        if (!sessionActive && !specialSession) {
          showExplanation('Not in Session', 'The Legislature is not currently in session. Wait for regular or special session.');
          return;
        }
        
        saveActionState();
        
        const ltGovChange = withParty ? bill.ltGovGain : -Math.floor(bill.ltGovGain * 1.5);
        const billAligned = (bill.liberal && selectedDistrict.party === 'Democrat') ||
                           (!bill.liberal && selectedDistrict.party === 'Republican');
        
        let approvalChange = withParty ? 
          (billAligned ? 2 : -3) : 
          (billAligned ? -2 : 3);
        
        // Special case for vouchers - rural opposition
        if (bill.id === 1 && selectedDistrict.name.includes('rural')) {
          approvalChange = withParty ? -5 : 3;

        setLtGovInfluence(prev => prev + ltGovChange);
        setApproval(prev => constrainApproval(prev + approvalChange));
        setActionsLeft(prev => prev - 1);
        setVotedBills(prev => [...prev, bill.id]);
        setVoteHistory(prev => [...prev, { billId: bill.id, billName: bill.name, withParty, round }]);
        
        if (bill.liberal === null) {
          setRetrospectiveVoting(prev => prev + 1);
        } else if (!withParty && billAligned) {
          setRetrospectiveVoting(prev => prev - 1);
        }
        
        let leaderReaction = '';
        if (ltGovChange < -10 && !primaryChallenge) {
          setPrimaryChallenge(true);
          leaderReaction = 'LT. GOV PATRICK WARNING: "You\'re crossing me! I control your committees and your future!"\n\n';
          addLog('Lt. Gov threatens to strip committee assignments!', 'warning');

          leaderReaction = 'LT. GOV PATRICK: "Excellent loyalty! You have a bright future in the Texas Senate."\n\n';
        } else if (ltGovChange < 0) {
          leaderReaction = 'LT. GOV PATRICK: "Disappointed in your lack of party discipline."\n\n';
        }
        
        let constituentReaction = '';
        if (approvalChange > 0) {
          constituentReaction = 'CONSTITUENTS: "This is Texas values!"\n\n';
        } else if (approvalChange < -2) {
          constituentReaction = 'CONSTITUENTS: "This isn\'t what we voted for! Remember the Alamo!"\n\n';
        }
        
        const headline = generateHeadline('vote', { bill: bill.name, withParty });
        setHeadlines(prev => [...prev, headline].slice(-5));
        setTweets(prev => [...prev, generateTweet('vote', approvalChange)].slice(-5));
        
        const explanation = 'You voted ' + (withParty ? 'WITH' : 'AGAINST') + ' leadership on ' + bill.name + '.\n\n' +
          leaderReaction + constituentReaction +
          'Lt. Gov Influence: ' + (ltGovChange >= 0 ? '+' : '') + ltGovChange + '\n' +
          'Approval: ' + (approvalChange >= 0 ? '+' : '') + approvalChange + '%';
        
        showExplanation('Vote Impact', explanation);
        addLog('Voted on ' + bill.name + '. Lt.Gov ' + (ltGovChange >= 0 ? '+' : '') + ltGovChange + ', Approval ' + (approvalChange >= 0 ? '+' : '') + approvalChange + '%', 
               ltGovChange >= 0 ? 'success' : 'warning');
      };

      const handleCasework = () => {
        if (actionsLeft <= 0) return;
        
        saveActionState();
        
        const approvalGain = 2 + Math.floor(incumbencyBonus / 2);
        setApproval(prev => constrainApproval(prev + approvalGain));
        setCaseworkCount(prev => prev + 1);
        setActionsLeft(prev => prev - 1);
        
        const headline = generateHeadline('casework');
        setHeadlines(prev => [...prev, headline].slice(-5));
        setTweets(prev => [...prev, generateTweet('casework', approvalGain)].slice(-5));
        
        const explanation = 'CONSTITUENT: "You really helped with my property tax protest! God bless Texas!"\n\n' +
          'Approval +' + approvalGain + '% (bonus increases with incumbency!)';
        
        showExplanation('Casework Impact', explanation);
        addLog('Completed casework. Approval +' + approvalGain + '%', 'success');
      };

      const handleAdvertising = () => {
        if (actionsLeft <= 0 || money < selectedAdType.cost || !selectedAdIssue) return;
        
        saveActionState();
        
        const effectiveness = selectedAdType.multiplier;
        const baseImpact = calculateImpact(selectedAdIssue);
        const impact = Math.round(baseImpact * effectiveness);
        
        setMoney(prev => prev - selectedAdType.cost);
        setApproval(prev => constrainApproval(prev + impact));
        setActionsLeft(prev => prev - 1);
        
        if (impact > 0 && issueOwnership[selectedAdIssue] !== undefined) {
          setIssueOwnership(prev => ({
            ...prev,
            [selectedAdIssue]: Math.min(10, prev[selectedAdIssue] + 1)
          }));
        }
        
        const issueData = issues.find(i => i.id === selectedAdIssue);
        const headline = generateHeadline('ad', { medium: selectedAdType.name, issue: selectedAdIssue });
        setHeadlines(prev => [...prev, headline].slice(-5));
        setTweets(prev => [...prev, generateTweet('ad', impact)].slice(-5));
        
        const explanation = 'You ran ' + selectedAdType.name + ' ads on ' + issueData.name + ' for $' + selectedAdType.cost.toLocaleString() + '.\n\n' +
          'Texas media markets are expensive!\n' +
          'Approval ' + (impact >= 0 ? '+' : '') + impact + '%';
        
        showExplanation('Advertising Impact', explanation);
        addLog('Ran ' + selectedAdType.name + ' ads on ' + issueData.name + '. Cost $' + selectedAdType.cost + ', Approval ' + (impact >= 0 ? '+' : '') + impact + '%',

        setSelectedAdType(null);
        setSelectedAdIssue(null);
      };

      const handleSpeech = () => {
        if (actionsLeft <= 0 || !selectedSpeechIssue) return;
        
        saveActionState();
        
        const impact = calculateImpact(selectedSpeechIssue);
        const issueBonus = issueOwnership[selectedSpeechIssue] ? 1 : 0;
        const totalImpact = impact + issueBonus;
        
        setApproval(prev => constrainApproval(prev + totalImpact));
        setLtGovInfluence(prev => prev + 3);
        setActionsLeft(prev => prev - 1);
        
        const issueData = issues.find(i => i.id === selectedSpeechIssue);
        const headline = generateHeadline('speech', { issue: selectedSpeechIssue });
        setHeadlines(prev => [...prev, headline].slice(-5));
        setTweets(prev => [...prev, generateTweet('speech', totalImpact)].slice(-5));
        
        const explanation = 'You gave a public speech on ' + issueData.name + '!\n\n' +

        addLog('Gave speech on ' + issueData.name + '. Approval ' + (totalImpact >= 0 ? '+' : '') + totalImpact + '%, Lt.Gov +3', 
               totalImpact >= 0 ? 'success' : 'warning');
        
        setSelectedSpeechIssue(null);
        setShowSpeechPanel(false);
      };

      const handleCommittee = (committeeData) => {
        if (actionsLeft <= 0 || committees.includes(committeeData.name)) return;
        
        if (round < committeeData.minRound) {
          showExplanation('Too Early in Term - Need More Seniority', 
            `You cannot join the ${committeeData.name} Committee yet.\n\n` +
            `Current Round: ${round}\n` +

            'Build seniority and try again!');
          return;

        if (ltGovInfluence < committeeData.minInfluence) {

            `Your Influence: ${ltGovInfluence}\n` +
            `Required Influence: ${committeeData.minInfluence}\n\n` +
            'Vote with leadership to build influence!');
          return;

        saveActionState();
        
        setCommittees(prev => [...prev, committeeData.name]);
        setLtGovInfluence(prev => prev + committeeData.ltGovGain);
        setActionsLeft(prev => prev - 1);

        setVotedBills([]);

        addLog('Round ' + (round + 1) + ' begins (Months ' + ((round * 2) + 1) + '-' + ((round + 1) * 2) + ')', 'info');
      };

            chartInstance.current = new window.Chart(ctx, {
              type: 'line',
              data: {
                labels: approvalHistory.map((_, i) => 'R' + (i + 1)),
                datasets: [{
                  label: 'Approval Rating',
                  data: approvalHistory,
                  borderColor: '#002868',
                  backgroundColor: 'rgba(0, 40, 104, 0.1)',

                }, {
                  label: 'Target (50%)',
                  data: Array(approvalHistory.length).fill(50),
                  borderColor: '#bf0a30',
                  borderDash: [5, 5],
                  pointRadius: 0
                }, {
                  label: 'Ceiling',
                  data: Array(approvalHistory.length).fill(approvalCeiling),
                  borderColor: '#10b981',

                  pointRadius: 0
                }, {
                  label: 'Floor',
                  data: Array(approvalHistory.length).fill(approvalFloor),

                  borderDash: [3, 3],
                  pointRadius: 0

                plugins: {
                  legend: { position: 'top' }
                },

                  y: { beginAtZero: true, max: 100 }
                }

          return () => {
            if (chartInstance.current) {
              chartInstance.current.destroy();
            }

            </div>
          </div>
        );

              Round {round} of 12 • Months {(round - 1) * 2 + 1}-{round * 2} • Actions: {actionsLeft}
              {primaryChallenge && <span style={{ color: '#bf0a30', fontWeight: 'bold' }}> • ⚠️ Primary Challenge Threatened!</span>}
              {specialSession && <span style={{ color: '#f59e0b', fontWeight: 'bold' }}> • 📢 SPECIAL SESSION!</span>}
            </p>
            
            {/* Legislature Control Banner */}
            <div className="legislature-control-banner">
              Texas Senate: 🔴 Republican Control (20-11) 
              {sessionActive ? ' • Regular Session (140 days)' :
               specialSession ? ' • Special Session (30 days)' :
               ' • Interim Period'}
            </div>
            
            {/* Lt Governor Status */}
            <div className="mb-4">
              <LtGovStatusIndicator />
            </div>
            
            {/* Stats */}
            <div className="grid grid-3 mb-4" style={{ gridTemplateColumns: 'repeat(6, 1fr)' }}>
              <div className="stat-box">
                <div className="stat-label">Funds</div>
                <div className="stat-value" style={{ color: '#059669' }}>${(money/1000).toFixed(0)}K</div>
              </div>
              <div className="stat-box">
                <div className="stat-label">Approval</div>
                <div className="stat-value" style={{ color: approval >= 50 ? '#002868' : '#bf0a30' }}>{approval}%</div>
                <div className="approval-floor-ceiling">
                  <span>{approvalFloor}%</span>
                  <span>{approvalCeiling}%</span>
                </div>
              </div>
              <div className="stat-box">
                <div className="stat-label">Texas</div>
                <div className="stat-value" style={{ color: '#bf0a30' }}>{texasApproval}%</div>
              </div>
              <div className="stat-box">
                <div className="stat-label">Lt.Gov</div>
                <div className="stat-value" style={{ color: ltGovInfluence >= 0 ? '#002868' : '#bf0a30' }}>{ltGovInfluence}</div>
              </div>
              <div className="stat-box">
                <div className="stat-label">Energy</div>
                <div className="stat-value" style={{ color: '#f59e0b' }}>{energyInfluence}%</div>
              </div>
              <div className="stat-box">
                <div className="stat-label">Casework</div>
                <div className="stat-value">{caseworkCount}</div>
              </div>
            </div>

            {/* Location buttons */}
            <div className="mb-4">
              <button className={'location-btn' + (location === 'district' ? ' active' : '')} 
                      onClick={() => setLocation('district')}>
                🏘️ District
              </button>
              <button className={'location-btn' + (location === 'austin' ? ' active' : '')} 
                      onClick={() => setLocation('austin')}>
                🏛️ Austin Capitol
              </button>
              <button className={'location-btn' + (showDistrictInfo ? ' active' : '')} 
                      onClick={() => setShowDistrictInfo(!showDistrictInfo)}>
                📋 District Info
              </button>
              <button className={'location-btn' + (showDashboard ? ' active' : '')} 
                      onClick={() => setShowDashboard(!showDashboard)}>
                📊 Dashboard
              </button>
              <button className={'location-btn' + (showCharacters ? ' active' : '')} 
                      onClick={() => setShowCharacters(!showCharacters)}>
                👥 Characters
              </button>
            </div>
          </div>

          {/* District Info Panel */}
          {showDistrictInfo && selectedDistrict && (
            <div className="card">
              <h3>District Information - {selectedDistrict.name}</h3>
              <div style={{ 
                background: selectedDistrict.party === 'Democrat' ? 
                  'linear-gradient(135deg, #dbeafe, #bfdbfe)' : 
                  'linear-gradient(135deg, #fee2e2, #fecaca)',
                padding: '16px',
                borderRadius: '8px',
                marginBottom: '16px'
              }}>
                <h4 style={{ 
                  color: selectedDistrict.party === 'Democrat' ? '#1e40af' : '#991b1b',
                  marginBottom: '12px'
                }}>
                  You are a {selectedDistrict.party} Senator
                </h4>
                <p className="text-sm">{selectedDistrict.description}</p>
              </div>
              
              <div className="grid grid-2 mb-4">
                <div>
                  <h4 className="mb-2">Demographics</h4>
                  <div className="stat-box">
                    <div className="text-sm mb-1">Hispanic: <strong>{selectedDistrict.demographics.hispanic}%</strong></div>
                    <div className="text-sm mb-1">White: <strong>{selectedDistrict.demographics.white}%</strong></div>
                    <div className="text-sm mb-1">Black: <strong>{selectedDistrict.demographics.black}%</strong></div>
                    <div className="text-sm">Asian: <strong>{selectedDistrict.demographics.asian}%</strong></div>
                  </div>
                </div>
                <div>
                  <h4 className="mb-2">Key Industries</h4>
                  <div className="stat-box">
                    <div className="text-sm">{selectedDistrict.industries.join(', ')}</div>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Show dashboard and characters if toggled */}
          {showDashboard && <DataDashboard />}
          {showCharacters && <CharacterPanel />}
          <MediaDashboard />

          {/* District Actions */}
          {location === 'district' ? (
            <>
              <div className="card">
                <h3>District Actions - Campaign & Outreach</h3>
                
                {/* Campaign Options */}
                {!selectedAdType && !showSpeechPanel && (
                  <div style={{ marginBottom: '20px', padding: '16px', background: 'linear-gradient(135deg, #f0f9ff, #e0f2fe)', borderRadius: '8px', border: '2px solid #0284c7' }}>
                    <h4 style={{ marginBottom: '12px' }}>Campaign & Outreach Options</h4>
                    <div className="grid grid-4">
                      {adTypes.map(adType => (
                        <button 
                          key={adType.id}
                          className="action-btn"
                          disabled={actionsLeft <= 0 || money < adType.cost}
                          onClick={() => setSelectedAdType(adType)}
                        >
                          <div style={{ fontSize: '48px', marginBottom: '8px' }}>{adType.icon}</div>
                          <div className="font-bold">{adType.name} Ads</div>
                          <div className="text-sm text-gray">${(adType.cost/1000).toFixed(0)}K</div>
                          <div className="text-xs text-gray">{adType.description} ({adType.multiplier}x)</div>
                        </button>
                      ))}
                      <button className="action-btn" 
                              disabled={actionsLeft <= 0}
                              onClick={() => setShowSpeechPanel(true)}>
                        <div style={{ fontSize: '48px', marginBottom: '8px' }}>🎤</div>
                        <div className="font-bold">Public Speech</div>
                        <div className="text-sm text-gray">Free</div>
                        <div className="text-xs text-gray">Choose issue (+3 Lt.Gov)</div>
                      </button>
                    </div>
                  </div>
                )}
                
                {/* Ad Issue Selection */}
                {selectedAdType && (
                  <div className="issue-select-panel">
                    <h4 style={{ marginBottom: '12px' }}>Select Issue for {selectedAdType.name} Campaign (${(selectedAdType.cost/1000).toFixed(0)}K)</h4>
                    <div style={{ display: 'flex', flexWrap: 'wrap', marginBottom: '16px' }}>
                      {issues.map(issue => (
                        <button 
                          key={issue.id}
                          className={`issue-btn ${selectedAdIssue === issue.id ? 'selected' : ''}`}
                          onClick={() => setSelectedAdIssue(issue.id)}
                        >
                          {issue.icon} {issue.name}
                        </button>
                      ))}
                    </div>
                    <div style={{ display: 'flex', gap: '12px' }}>
                      <button className="btn btn-primary" 
                              disabled={!selectedAdIssue}
                              onClick={handleAdvertising}>
                        Launch {selectedAdType.name} Campaign
                      </button>
                      <button className="btn btn-secondary" 
                              onClick={() => {
                                setSelectedAdType(null);
                                setSelectedAdIssue(null);
                              }}>
                        Cancel
                      </button>
                    </div>
                  </div>
                )}
                
                {/* Speech Issue Selection */}
                {showSpeechPanel && (
                  <div className="issue-select-panel">
                    <h4 style={{ marginBottom: '12px' }}>Select Issue for Public Speech</h4>
                    <div style={{ display: 'flex', flexWrap: 'wrap', marginBottom: '16px' }}>
                      {issues.map(issue => (
                        <button 
                          key={issue.id}
                          className={`issue-btn ${selectedSpeechIssue === issue.id ? 'selected' : ''}`}
                          onClick={() => setSelectedSpeechIssue(issue.id)}
                        >
                          {issue.icon} {issue.name}
                        </button>
                      ))}
                    </div>
                    <div style={{ display: 'flex', gap: '12px' }}>
                      <button className="btn btn-primary" 
                              disabled={!selectedSpeechIssue}
                              onClick={handleSpeech}>
                        Give Speech
                      </button>
                      <button className="btn btn-secondary" 
                              onClick={() => {
                                setShowSpeechPanel(false);
                                setSelectedSpeechIssue(null);
                              }}>
                        Cancel
                      </button>
                    </div>
                  </div>
                )}
                
                {/* Casework */}
                {!selectedAdType && !showSpeechPanel && (
                  <button className="btn btn-warning" disabled={actionsLeft <= 0}
                          onClick={handleCasework} style={{ width: '100%', padding: '24px', fontSize: '20px' }}>
                    <span style={{ fontSize: '36px', marginRight: '12px' }}>🤝</span>
                    <span>
                      <strong>Constituent Service (Casework)</strong> - Most reliable approval gain!<br/>
                      <span style={{ fontSize: '16px' }}>Help with property taxes, permits, state services • Approval +{2 + Math.floor(incumbencyBonus / 2)}%</span>
                    </span>
                  </button>
                )}
              </div>

              <div className="card">
                <h3>Fundraising (Remember: NO contribution limits in Texas!)</h3>
                <div className="grid grid-3">
                  {interestGroups.map(group => (
                    <button key={group.name} className="action-btn"
                            disabled={actionsLeft <= 0}
                            onClick={() => handleFundraising(group)}
                            style={{ padding: '24px' }}>
                      <div style={{ fontSize: '40px', marginBottom: '10px' }}>💰</div>
                      <div className="font-bold" style={{ fontSize: '16px' }}>{group.name}</div>
                      <div className="text-sm" style={{ color: '#059669', fontSize: '20px', fontWeight: 'bold' }}>${group.amount.toLocaleString()}</div>
                      <div className="text-xs text-gray">{group.description}</div>
                    </button>
                  ))}
                </div>
              </div>
            </>
          ) : (
            <>
              <div className="card">
                <h3>Vote on Bills {sessionActive || specialSession ? '(Session Active)' : '(Not in Session)'}</h3>
                
                {/* Voting Logic Explainer Box */}
                <div style={{ 
                  background: 'linear-gradient(135deg, #f0fdf4, #dcfce7)',
                  border: '2px solid #10b981',
                  borderRadius: '8px',
                  padding: '16px',
                  marginBottom: '16px'
                }}>
                  <h4 style={{ color: '#065f46', marginBottom: '12px' }}>
                    🗳️ Texas Senate Voting Explained
                  </h4>
                  <div className="text-sm">
                    <div className="mb-2">
                      <strong>Your Party:</strong> {selectedDistrict?.party} | 
                      <strong> Senate Control:</strong> Republican (20-11)
                    </div>
                    <div className="mb-2">
                      <strong>Vote WITH Leadership:</strong> Gain Lt. Gov influence (+8 to +15)
                    </div>
                    <div className="mb-2">
                      <strong>Vote AGAINST Leadership:</strong> Lose Lt. Gov influence (-12 to -22)
                    </div>
                    <div>
                      <strong>Special Note:</strong> Vouchers split Republicans! Rural districts oppose.
                    </div>
                  </div>
                </div>
                
                {!sessionActive && !specialSession && (
                  <div className="explanation-box mb-4">
                    <p><strong>Legislature Not in Session!</strong> Texas meets 140 days every 2 years. Wait for regular or special session to vote.</p>
                  </div>
                )}
                
                <div className="grid grid-2">
                  {getAvailableBills().map(bill => {
                    const hasVoted = votedBills.includes(bill.id);
                    return (
                      <div key={bill.id} 
                           className={`bill-card ${hasVoted ? 'voted' : ''}`}
                           onMouseEnter={() => setHoveredBill(bill.id)}
                           onMouseLeave={() => setHoveredBill(null)}>
                        {hoveredBill === bill.id && (
                          <BillTooltip bill={bill} district={selectedDistrict} />
                        )}
                        <div className="font-bold mb-2" style={{ fontSize: '18px' }}>
                          {hasVoted && '✔ '}{bill.name}
                        </div>
                        <div className="text-sm text-gray mb-3">Issue: {bill.issue}</div>
                        {hasVoted ? (
                          <div style={{ textAlign: 'center', padding: '14px', background: '#d1fae5', borderRadius: '4px' }}>
                            <span style={{ color: '#065f46', fontWeight: 'bold', fontSize: '16px' }}>Already Voted</span>
                          </div>
                        ) : (
                          <div className="grid grid-2" style={{ gap: '10px' }}>
                            <button className="btn btn-success" 
                                    disabled={actionsLeft <= 0 || (!sessionActive && !specialSession)}
                                    onClick={() => handleVote(bill, true)}
                                    style={{ padding: '14px' }}>
                              <div style={{ fontSize: '28px', marginBottom: '6px' }}>✅</div>
                              WITH Leadership<br/>
                              <span className="text-xs">+{bill.ltGovGain} Lt.Gov</span>
                            </button>
                            <button className="btn btn-danger" 
                                    disabled={actionsLeft <= 0 || (!sessionActive && !specialSession)}
                                    onClick={() => handleVote(bill, false)}
                                    style={{ padding: '14px' }}>
                              <div style={{ fontSize: '28px', marginBottom: '6px' }}>❌</div>
                              AGAINST<br/>
                              <span className="text-xs">-{Math.floor(bill.ltGovGain * 1.5)} Lt.Gov</span>
                            </button>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>

              <div className="card">
                <h3>Join Committees (Lt. Governor Controls All Appointments)</h3>
                
                <div className="committee-tier-box mb-4">
                  <h4 className="mb-2">🏛️ Texas Senate Committee System</h4>
                  <div className="text-sm">
                    <div className="mb-2"><strong>Tier 1 (Regular):</strong> Available Round 2+ • +6 Lt.Gov • Entry committees</div>
                    <div className="mb-2"><strong>Tier 2 (Important):</strong> Round 4+, Influence≥5 • +10-12 Lt.Gov • Major influence</div>
                    <div className="mb-2"><strong>Tier 3 (Elite):</strong> Round 6+, Influence≥15 • +18-25 Lt.Gov • Finance controls $300B budget!</div>
                  </div>
                </div>
                
                <div className="grid grid-2">
                  {committeesList.map(comm => {
                    const canJoin = !committees.includes(comm.name) && 
                                   round >= comm.minRound && 
                                   ltGovInfluence >= comm.minInfluence;
                    const tierLabel = comm.tier === 3 ? '⭐ ELITE' : 
                                     comm.tier === 2 ? '🎖️ Important' : 
                                     '📋 Regular';
                    const tierColor = comm.tier === 3 ? '#8b5cf6' : 
                                     comm.tier === 2 ? '#0ea5e9' : 
                                     '#6b7280';
                    
                    return (
                      <button key={comm.name} className="action-btn"
                              disabled={actionsLeft <= 0 || !canJoin || committees.includes(comm.name)}
                              onClick={() => handleCommittee(comm)}
                              style={{ padding: '20px' }}>
                        <div className="font-bold" style={{ fontSize: '17px' }}>{comm.name}</div>
                        <div className="text-xs mb-2" style={{ color: tierColor }}>{tierLabel} (+{comm.ltGovGain} Lt.Gov)</div>
                        
                        {committees.includes(comm.name) && (
                          <span style={{ color: '#10b981', fontSize: '16px' }}>✔ Member</span>
                        )}
                        
                        {!committees.includes(comm.name) && (
                          <>
                            {round < comm.minRound && (
                              <span className="text-xs" style={{ color: '#ef4444' }}>
                                Need Round {comm.minRound} (now: {round})
                              </span>
                            )}
                            {round >= comm.minRound && ltGovInfluence < comm.minInfluence && (
                              <span className="text-xs" style={{ color: '#ef4444' }}>
                                Need Influence ≥ {comm.minInfluence} (have: {ltGovInfluence})
                              </span>
                            )}
                            {canJoin && (
                              <span className="text-xs" style={{ color: '#10b981' }}>
                                ✔ Eligible to join!
                              </span>
                            )}
                          </>
                        )}
                      </button>
                    );
                  })}
                </div>
              </div>
            </>
          )}

          {/* Game Log */}
          {gameLog.length > 0 && (
            <div className="card">
              <h3>Recent Activity</h3>
              {gameLog.map((log, i) => (
                <div key={i} className={'log-item log-' + log.type}>
                  Round {log.round}: {log.message}
                </div>
              ))}
            </div>
          )}

          {/* End Round Button */}
          <div className="card">
            <button className="btn btn-primary" style={{ width: '100%', fontSize: '18px', padding: '16px' }}
                    disabled={actionsLeft > 0}
                    onClick={endRound}>
              {actionsLeft > 0 ? 'Complete ' + actionsLeft + ' more actions' : 'End Round →'}
            </button>
            {actionsLeft === 0 && (
              <p className="text-center text-sm text-gray" style={{ marginTop: '10px' }}>
                All actions completed! Click to advance to Round {round + 1}
                {round === 6 && ' (Midpoint of term!)'}
              </p>
            )}
          </div>

          {/* Control Panel */}
          <div className="control-panel">
            {showSaveLoad && (
              <div className="save-load-panel">
                <h4 style={{ marginBottom: '12px' }}>Save/Load Game</h4>
                {savedGames.map(save => (
                  <div key={save.slot} className="save-slot">
                    <span>
                      Slot {save.slot}
                      {save.timestamp && <span className="text-xs"> ({new Date(save.timestamp).toLocaleDateString()})</span>}
                    </span>
                    <div>
                      <button className="btn btn-primary" onClick={() => saveGame(save.slot)} style={{ marginRight: '4px' }}>
                        Save
                      </button>
                      {save.data && (
                        <>
                          <button className="btn btn-success" onClick={() => loadGame(save.slot)}>
                            Load
                          </button>
                          <button className="btn btn-danger" onClick={() => deleteGame(save.slot)}>
                            Delete
                          </button>
                        </>
                      )}
                    </div>
                  </div>
                ))}
              </div>
            )}
            
            <button className="control-btn" onClick={() => setShowSaveLoad(!showSaveLoad)}>
              💾 Save/Load
            </button>
            
            <button className="control-btn" onClick={undoLastAction} 
                    disabled={!lastAction || actionsLeft === 3}>
              ↩️ Undo Last
            </button>
            
            <button className="control-btn" onClick={resetRound}>
              🔄 Reset Round
            </button>
            
            <button className="control-btn" onClick={resetGame}
                    style={{ background: 'rgba(191, 10, 48, 0.9)' }}>
              🔴 Reset Game
            </button>
          </div>

          {/* Modal for explanations */}
          {showModal && (
            <div className="modal-overlay" onClick={() => setShowModal(false)}>
              <div className="modal-content" onClick={e => e.stopPropagation()}>
                <h2>{modalContent.title}</h2>
                <div style={{ whiteSpace: 'pre-wrap', marginTop: '20px', marginBottom: '28px', lineHeight: '1.6' }}>
                  {modalContent.message}
                </div>
                <button className="btn btn-primary" onClick={() => setShowModal(false)} style={{ width: '100%' }}>
                  Close
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎡 Wheel of Levi!</title>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Bungee+Shade&family=Permanent+Marker&family=Rubik+Glitch&family=Henny+Penny&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --neon-green:#39FF14; --neon-pink:#FF6EC7; --neon-cyan:#00FFFF;
            --neon-orange:#FF6700; --neon-yellow:#FFFF00; --neon-purple:#BF00FF;
            --neon-red:#FF073A; --bg-dark:#001030; --bg-mid:#001848; --bg-light:#002060;
            --neon-blue:#0080FF; --neon-blue-glow:rgba(0,128,255,0.4);
        }
        body {
            font-family:'Permanent Marker',cursive;
            background:var(--bg-dark);
            background-image:
                radial-gradient(ellipse at 20% 50%,rgba(0,100,255,0.12),transparent 50%),
                radial-gradient(ellipse at 80% 30%,rgba(57,255,20,0.06),transparent 50%),
                radial-gradient(ellipse at 50% 90%,rgba(0,180,255,0.10),transparent 40%);
            color:white; min-height:100vh; overflow-x:hidden;
        }

        /* ═══ SETUP ═══ */
        .setup-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:40px 20px; }
        .setup-screen.hidden { display:none; }
        .setup-logo {
            font-family:'Bungee Shade',cursive; font-size:clamp(2em,7vw,4.5em);
            background:linear-gradient(90deg,var(--neon-green),var(--neon-cyan),var(--neon-pink),var(--neon-orange),var(--neon-yellow));
            background-size:300% 100%; -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            animation:rainbowShift 4s ease infinite; text-align:center; margin-bottom:0;
            filter:drop-shadow(0 0 20px rgba(57,255,20,0.4));
        }
        @keyframes rainbowShift { 0%,100%{background-position:0% 50%;} 50%{background-position:100% 50%;} }
        .setup-subtitle {
            font-family:'Creepster',cursive; font-size:clamp(1.2em,3vw,1.8em);
            color:var(--neon-pink); letter-spacing:4px; text-align:center; margin-bottom:35px;
            text-shadow:0 0 10px rgba(255,110,199,0.6);
        }
        .setup-box {
            background:rgba(0,16,48,0.7); border:3px solid var(--neon-blue);
            border-radius:20px; padding:35px; max-width:600px; width:100%;
            box-shadow:0 0 30px rgba(0,128,255,0.25),inset 0 0 40px rgba(0,128,255,0.08);
        }
        .setup-label { font-family:'Creepster',cursive; font-size:1.2em; color:var(--neon-cyan); margin-bottom:15px; letter-spacing:2px; text-shadow:0 0 8px rgba(0,255,255,0.4); }
        .player-count-row { display:flex; gap:12px; justify-content:center; margin-bottom:25px; flex-wrap:wrap; }
        .pc-btn {
            width:64px; height:64px; background:rgba(255,255,255,0.04);
            border:3px solid var(--neon-green); color:var(--neon-green);
            font-family:'Creepster',cursive; font-size:2em; border-radius:14px; cursor:pointer;
            transition:all 0.3s; text-shadow:0 0 10px rgba(57,255,20,0.6);
        }
        .pc-btn:hover { background:rgba(57,255,20,0.15); transform:scale(1.15) rotate(-3deg); box-shadow:0 0 20px rgba(57,255,20,0.4); }
        .pc-btn.selected { background:var(--neon-green); color:var(--bg-dark); text-shadow:none; transform:scale(1.1); }
        .player-names { display:grid; gap:12px; margin-bottom:25px; }
        .pname-input {
            background:rgba(255,255,255,0.05); border:2px solid rgba(0,128,255,0.4);
            color:var(--neon-yellow); padding:14px 18px; font-size:1.1em;
            border-radius:10px; font-family:'Permanent Marker',cursive;
            text-shadow:0 0 5px rgba(255,255,0,0.3);
        }
        .pname-input::placeholder { color:rgba(255,255,255,0.25); text-shadow:none; }
        .pname-input:focus { outline:none; border-color:var(--neon-pink); box-shadow:0 0 15px rgba(255,110,199,0.3); }
        .start-btn {
            display:block; margin:0 auto;
            background:linear-gradient(135deg,var(--neon-pink),var(--neon-purple));
            color:white; border:none; padding:16px 50px;
            font-family:'Creepster',cursive; font-size:1.8em; letter-spacing:3px;
            border-radius:14px; cursor:pointer;
            box-shadow:0 0 30px rgba(255,110,199,0.4); transition:all 0.3s;
            text-shadow:0 0 10px rgba(255,255,255,0.5);
        }
        .start-btn:hover { transform:scale(1.08) rotate(1deg); box-shadow:0 0 50px rgba(255,110,199,0.6); }

        /* ═══ GAME SCREEN ═══ */
        .game-screen { display:none; }
        .game-screen.active { display:block; }
        .game-header { text-align:center; padding:14px 20px 8px; }
        .game-title {
            font-family:'Bungee Shade',cursive; font-size:clamp(1.8em,4.5vw,2.8em);
            background:linear-gradient(90deg,var(--neon-green),var(--neon-cyan),var(--neon-pink),var(--neon-orange),var(--neon-yellow));
            background-size:300% 100%; -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            animation:rainbowShift 4s ease infinite; letter-spacing:5px;
            filter:drop-shadow(0 0 15px rgba(0,128,255,0.4));
        }

        /* ═══ SCOREBOARD ═══ */
        .scoreboard { display:flex; justify-content:center; gap:10px; padding:8px 20px; flex-wrap:wrap; }
        .player-card {
            background:rgba(0,16,48,0.6); border:2px solid #444; border-radius:12px;
            padding:8px 20px; min-width:145px; text-align:center; transition:all 0.3s;
        }
        .player-card.active {
            border-color:var(--neon-green);
            box-shadow:0 0 20px rgba(57,255,20,0.3),inset 0 0 15px rgba(57,255,20,0.05);
        }
        .player-card .pname { font-family:'Creepster',cursive; font-size:0.95em; color:var(--neon-cyan); text-shadow:0 0 6px rgba(0,255,255,0.3); }
        .player-card .pscore { font-family:'Bungee Shade',cursive; font-size:1.4em; color:var(--neon-green); text-shadow:0 0 10px rgba(57,255,20,0.4); }
        .player-card .pscore.negative { color:var(--neon-red); text-shadow:0 0 10px rgba(255,7,58,0.4); }
        .player-card .round-score { font-size:0.7em; color:#666; font-family:'Permanent Marker',cursive; }

        /* ═══ PUZZLE BOARD ═══ */
        .board-wrapper { max-width:980px; margin:10px auto; padding:0 12px; }
        .category-bar { text-align:center; padding:6px; margin-bottom:6px; background:linear-gradient(90deg,transparent,rgba(0,128,255,0.25),transparent); border-radius:8px; }
        .category-label { font-family:'Creepster',cursive; font-size:1.1em; color:var(--neon-orange); letter-spacing:3px; text-transform:uppercase; text-shadow:0 0 10px rgba(255,103,0,0.4); }
        .puzzle-board {
            background:linear-gradient(135deg,#001050,#001848 50%,#002060);
            border:4px solid var(--neon-blue); border-radius:14px; padding:20px 16px;
            box-shadow:0 0 40px rgba(0,128,255,0.3),inset 0 0 50px rgba(0,0,0,0.4);
        }
        .board-row { display:flex; justify-content:center; gap:7px; margin-bottom:7px; }
        .board-row:last-child { margin-bottom:0; }
        .tile { width:58px; height:66px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-family:'Creepster',cursive; font-size:2.2em; position:relative; }
        .tile.letter {
            background:linear-gradient(180deg,rgba(0,80,200,0.35),rgba(0,50,150,0.2));
            border:2px solid rgba(0,140,255,0.35); color:transparent;
            box-shadow:inset 0 2px 8px rgba(0,0,0,0.5);
        }
        .tile.letter.revealed {
            background:linear-gradient(180deg,#0a1a3a,#081530);
            border-color:var(--neon-cyan);
            color:var(--neon-cyan);
            text-shadow:0 0 14px rgba(0,255,255,0.7);
            box-shadow:0 0 18px rgba(0,255,255,0.3),inset 0 0 12px rgba(0,255,255,0.08);
            animation:tileFlip 0.5s ease-out;
        }
        @keyframes tileFlip { 0%{transform:rotateX(90deg) scale(0.8);opacity:0.3;} 60%{transform:rotateX(-8deg) scale(1.08);} 100%{transform:rotateX(0deg) scale(1);opacity:1;} }
        .tile.space { background:transparent; border:none; }

        /* ═══ USED LETTERS ═══ */
        .used-letters-bar { max-width:980px; margin:6px auto 0; padding:0 12px; }
        .used-letters-inner { display:flex; align-items:center; gap:8px; padding:6px 14px; background:rgba(0,0,0,0.4); border-radius:8px; flex-wrap:wrap; }
        .used-label { font-family:'Creepster',cursive; font-size:0.8em; color:#555; letter-spacing:2px; white-space:nowrap; }
        .used-letter { font-family:'Creepster',cursive; font-size:1em; border-radius:4px; width:26px; height:26px; display:inline-flex; align-items:center; justify-content:center; }
        .used-letter.hit { color:var(--neon-green); background:rgba(57,255,20,0.1); text-shadow:0 0 6px rgba(57,255,20,0.4); }
        .used-letter.miss { color:var(--neon-red); background:rgba(255,7,58,0.08); }

        /* Vowel-only warning */
        .vowel-warning {
            display:none; text-align:center; padding:10px 16px; margin:8px auto 0;
            max-width:980px;
            background:linear-gradient(90deg,transparent,rgba(255,200,0,0.12),transparent);
            border:1px solid rgba(255,200,0,0.3); border-radius:8px;
            animation:warningPulse 1.5s ease-in-out infinite;
        }
        .vowel-warning.active { display:block; }
        .vowel-warning-text {
            font-family:'Creepster',cursive; font-size:1.05em; color:var(--neon-yellow);
            text-shadow:0 0 10px rgba(255,255,0,0.4); letter-spacing:2px;
        }
        @keyframes warningPulse { 0%,100%{opacity:0.7;} 50%{opacity:1;} }

        /* Keyboard active hint */
        .kb-hint { font-size:0.7em; color:#555; text-align:center; margin-top:6px; font-family:'Permanent Marker',cursive; }
        .kb-hint kbd { background:rgba(255,255,255,0.08); border:1px solid #444; border-radius:4px; padding:1px 6px; color:#999; }

        /* ═══ GAME LOWER ═══ */
        .game-lower { display:flex; align-items:flex-start; justify-content:center; gap:30px; padding:14px 20px; flex-wrap:wrap; max-width:1100px; margin:0 auto; }

        /* ═══ WHEEL ═══ */
        .wheel-container { position:relative; width:380px; height:380px; flex-shrink:0; }
        .wheel-canvas { width:380px; height:380px; transition:filter 0.3s; }
        .wheel-canvas.spinning { filter:drop-shadow(0 0 40px rgba(0,128,255,0.7)) brightness(1.1); }
        .wheel-pointer {
            position:absolute; top:-8px; left:50%; transform:translateX(-50%);
            width:0; height:0; border-left:16px solid transparent; border-right:16px solid transparent;
            border-top:38px solid var(--neon-pink);
            filter:drop-shadow(0 0 10px rgba(255,110,199,0.8)); z-index:10;
        }
        .wheel-center-cap {
            position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
            width:52px; height:52px;
            background:radial-gradient(circle at 35% 35%,#222,#000);
            border-radius:50%; border:3px solid var(--neon-blue);
            box-shadow:0 0 20px rgba(0,128,255,0.5); z-index:5;
            display:flex; align-items:center; justify-content:center;
            font-size:1.5em; color:var(--neon-cyan);
            font-family:'Creepster',cursive; text-shadow:0 0 10px rgba(0,255,255,0.6);
        }

        /* ═══ ACTION PANEL ═══ */
        .action-panel { max-width:340px; width:100%; }
        .turn-indicator { text-align:center; margin-bottom:10px; padding:8px 12px; background:rgba(0,100,255,0.1); border:1px solid rgba(0,128,255,0.3); border-radius:10px; }
        .turn-name { font-family:'Creepster',cursive; color:var(--neon-pink); font-size:1.15em; letter-spacing:2px; text-shadow:0 0 8px rgba(255,110,199,0.4); }
        .round-badge { font-size:0.72em; color:#666; font-family:'Permanent Marker',cursive; margin-top:2px; }
        .spin-result { text-align:center; margin-bottom:12px; min-height:50px; }
        .spin-result-value { font-family:'Bungee Shade',cursive; font-size:2.2em; color:var(--neon-yellow); line-height:1; text-shadow:0 0 15px rgba(255,255,0,0.5); }
        .spin-result-label { font-size:0.8em; color:#999; margin-top:2px; font-family:'Permanent Marker',cursive; }
        .action-buttons { display:flex; flex-direction:column; gap:8px; margin-bottom:12px; }
        .action-btn {
            padding:13px 22px; border:2px solid; border-radius:12px;
            font-family:'Creepster',cursive; font-size:1.1em; letter-spacing:2px;
            cursor:pointer; transition:all 0.2s; text-transform:uppercase;
        }
        .action-btn:disabled { opacity:0.2; cursor:not-allowed; transform:none!important; }
        .action-btn:hover:not(:disabled) { transform:scale(1.04) rotate(-0.5deg); }
        .btn-spin { background:linear-gradient(135deg,var(--bg-light),var(--bg-dark)); border-color:var(--neon-cyan); color:var(--neon-cyan); text-shadow:0 0 8px rgba(0,255,255,0.4); }
        .btn-spin:hover:not(:disabled) { box-shadow:0 0 25px rgba(0,255,255,0.3); }
        .btn-vowel { background:linear-gradient(135deg,var(--bg-light),var(--bg-mid)); border-color:var(--neon-purple); color:var(--neon-purple); text-shadow:0 0 8px rgba(0,128,255,0.4); }
        .btn-solve { background:linear-gradient(135deg,var(--bg-mid),var(--bg-dark)); border-color:var(--neon-orange); color:var(--neon-orange); text-shadow:0 0 8px rgba(255,103,0,0.4); }

        /* ═══ GAME CONTROLS ═══ */
        .game-controls { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
        .ctrl-btn { flex:1; min-width:85px; padding:7px 8px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.1); color:#666; font-family:'Permanent Marker',cursive; font-size:0.72em; letter-spacing:1px; border-radius:6px; cursor:pointer; transition:all 0.2s; }
        .ctrl-btn:hover { background:rgba(255,255,255,0.07); color:#bbb; border-color:rgba(0,128,255,0.35); }

        /* ═══ LETTER PICKER ═══ */
        .letter-picker { display:none; background:rgba(0,12,40,0.85); border:2px solid rgba(0,255,255,0.3); border-radius:12px; padding:14px; margin-top:8px; }
        .letter-picker.active { display:block; }
        .letter-picker-title { font-family:'Creepster',cursive; color:var(--neon-cyan); text-align:center; margin-bottom:10px; letter-spacing:2px; font-size:0.95em; text-shadow:0 0 6px rgba(0,255,255,0.3); }
        .letter-grid { display:flex; flex-wrap:wrap; gap:5px; justify-content:center; }
        .letter-btn {
            width:38px; height:38px; background:rgba(255,255,255,0.04);
            border:2px solid rgba(0,128,255,0.3); color:white;
            font-family:'Creepster',cursive; font-size:1.25em;
            border-radius:8px; cursor:pointer; transition:all 0.15s;
        }
        .letter-btn:hover:not(:disabled) { background:var(--neon-pink); color:var(--bg-dark); border-color:var(--neon-pink); transform:scale(1.15) rotate(-5deg); box-shadow:0 0 15px rgba(255,110,199,0.5); }
        .letter-btn:disabled { opacity:0.1; cursor:not-allowed; }
        .letter-btn.vowel { border-color:rgba(57,255,20,0.3); }

        /* ═══ OVERLAYS ═══ */
        .solve-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,12,40,0.92); z-index:1000; justify-content:center; align-items:center; }
        .solve-overlay.active { display:flex; }
        .solve-box { background:linear-gradient(135deg,var(--bg-mid),var(--bg-dark)); border:3px solid var(--neon-pink); border-radius:18px; padding:35px; max-width:550px; width:90%; text-align:center; box-shadow:0 0 40px rgba(255,110,199,0.2); }
        .solve-box h2 { font-family:'Creepster',cursive; color:var(--neon-pink); font-size:1.8em; letter-spacing:3px; margin-bottom:18px; text-shadow:0 0 12px rgba(255,110,199,0.5); }
        .solve-input { width:100%; padding:14px; font-size:1.2em; font-family:'Creepster',cursive; letter-spacing:2px; text-transform:uppercase; background:rgba(255,255,255,0.05); border:2px solid var(--neon-blue); border-radius:10px; color:var(--neon-green); text-align:center; margin-bottom:18px; text-shadow:0 0 6px rgba(57,255,20,0.3); }
        .solve-input:focus { outline:none; border-color:var(--neon-cyan); box-shadow:0 0 20px rgba(0,255,255,0.2); }
        .solve-buttons { display:flex; gap:12px; justify-content:center; }
        .solve-confirm { padding:10px 40px; background:var(--neon-green); color:var(--bg-dark); border:none; font-family:'Creepster',cursive; font-size:1.3em; letter-spacing:2px; border-radius:10px; cursor:pointer; box-shadow:0 0 15px rgba(57,255,20,0.3); }
        .solve-cancel { padding:10px 28px; background:transparent; color:#888; border:2px solid #444; font-family:'Permanent Marker',cursive; font-size:1em; border-radius:10px; cursor:pointer; }

        .toast { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0); background:rgba(0,12,40,0.96); border:3px solid var(--neon-cyan); border-radius:18px; padding:28px 45px; z-index:2000; text-align:center; transition:transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275); pointer-events:none; box-shadow:0 0 60px rgba(0,255,255,0.3); }
        .toast.show { transform:translate(-50%,-50%) scale(1); }
        .toast-big { font-family:'Creepster',cursive; font-size:2.3em; color:var(--neon-green); letter-spacing:3px; text-shadow:0 0 15px rgba(57,255,20,0.5); }
        .toast-sub { font-size:0.95em; color:#ccc; margin-top:6px; font-family:'Permanent Marker',cursive; }

        .round-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,12,40,0.96); z-index:3000; justify-content:center; align-items:center; flex-direction:column; }
        .round-overlay.active { display:flex; }
        .round-overlay h1 {
            font-family:'Bungee Shade',cursive; font-size:clamp(2em,5vw,3em);
            background:linear-gradient(90deg,var(--neon-green),var(--neon-cyan),var(--neon-pink));
            background-size:200% 100%; -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            animation:rainbowShift 3s ease infinite; letter-spacing:4px;
            animation:roundPop 0.6s ease-out,rainbowShift 3s ease infinite;
        }
        .round-overlay p { font-family:'Creepster',cursive; color:var(--neon-purple); font-size:1.1em; letter-spacing:3px; margin-top:6px; text-shadow:0 0 8px rgba(0,128,255,0.4); }
        .round-overlay .hint-text { font-family:'Permanent Marker',cursive; color:#aaa; font-size:0.9em; margin-top:8px; }
        .round-overlay button { margin-top:28px; padding:13px 50px; background:linear-gradient(135deg,var(--neon-pink),var(--neon-purple)); color:white; border:none; font-family:'Creepster',cursive; font-size:1.5em; letter-spacing:3px; border-radius:12px; cursor:pointer; transition:transform 0.2s; box-shadow:0 0 25px rgba(255,110,199,0.3); text-shadow:0 0 8px rgba(255,255,255,0.3); }
        .round-overlay button:hover { transform:scale(1.08); }
        @keyframes roundPop { 0%{transform:scale(0.5);opacity:0;} 100%{transform:scale(1);opacity:1;} }

        .confirm-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,12,40,0.9); z-index:4000; justify-content:center; align-items:center; }
        .confirm-overlay.active { display:flex; }
        .confirm-box { background:var(--bg-mid); border:2px solid var(--neon-pink); border-radius:16px; padding:30px 35px; max-width:420px; width:90%; text-align:center; }
        .confirm-box p { font-family:'Creepster',cursive; color:#ddd; font-size:1.1em; margin-bottom:20px; }
        .confirm-btns { display:flex; gap:12px; justify-content:center; }
        .confirm-yes { padding:10px 30px; background:var(--neon-green); color:var(--bg-dark); border:none; font-family:'Creepster',cursive; font-size:1em; letter-spacing:2px; border-radius:8px; cursor:pointer; }
        .confirm-no { padding:10px 30px; background:transparent; color:#888; border:2px solid #555; font-family:'Permanent Marker',cursive; font-size:1em; border-radius:8px; cursor:pointer; }

        @media (max-width:850px) { .wheel-container{width:300px;height:300px;} .wheel-canvas{width:300px;height:300px;} .tile{width:46px;height:52px;font-size:1.7em;} .game-lower{gap:18px;} }
        @media (max-width:600px) { .wheel-container{width:250px;height:250px;} .wheel-canvas{width:250px;height:250px;} .tile{width:34px;height:40px;font-size:1.25em;} .board-row{gap:4px;margin-bottom:4px;} .puzzle-board{padding:12px 8px;} }
    </style>
</head>
<body>

<div class="setup-screen" id="setupScreen">
    <div class="setup-logo">WHEEL OF LEVI!</div>
    <div class="setup-subtitle">🦈 Brainrot Edition 🐊</div>
    <div class="setup-box">
        <div class="setup-label">👻 How Many Players?</div>
        <div class="player-count-row" id="playerCountRow"></div>
        <div id="playerNamesArea" style="display:none;">
            <div class="setup-label">🎃 Player Names</div>
            <div class="player-names" id="playerNamesGrid"></div>
        </div>
        <button class="start-btn" id="startBtn" style="display:none;" onclick="startGame()">LET'S GOOO! 🎡</button>
    </div>
</div>

<div class="game-screen" id="gameScreen">
    <div class="game-header"><div class="game-title">🎡 WHEEL OF LEVI! 🎡</div></div>
    <div class="scoreboard" id="scoreboard"></div>
    <div class="board-wrapper">
        <div class="category-bar"><div class="category-label" id="categoryLabel"></div></div>
        <div class="puzzle-board" id="puzzleBoard"></div>
    </div>

// ═══ WHEEL DRAWING ═══
const canvas=document.getElementById('wheelCanvas'), ctx=canvas.getContext('2d');
const W=canvas.width, CX=W/2, CY=W/2, R=W/2-22;

function drawWheel(angle=0){
    ctx.clearRect(0,0,W,W);
    const n=wheelSegments.length, arc=2*Math.PI/n;
    ctx.save(); ctx.translate(CX,CY); ctx.rotate(angle);

    for(let i=0;i<n;i++){
        const seg=wheelSegments[i], a0=i*arc-Math.PI/2, a1=a0+arc, amid=a0+arc/2;
        // Fill
        ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,R,a0,a1); ctx.closePath();
        ctx.fillStyle=seg.bg; ctx.fill();
        // Shine
        ctx.save(); ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,R,a0,a1); ctx.closePath(); ctx.clip();
        const gx=Math.cos(amid), gy=Math.sin(amid);
        const gr=ctx.createLinearGradient(gx*R*0.2,gy*R*0.2,gx*R,gy*R);
        gr.addColorStop(0,'rgba(255,255,255,0.2)'); gr.addColorStop(1,'rgba(0,0,0,0.1)');
        ctx.fillStyle=gr; ctx.fill(); ctx.restore();
        // Border
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(a0)*R,Math.sin(a0)*R);
        ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=1.5; ctx.stroke();
    }
    ctx.beginPath(); ctx.arc(0,0,R,0,2*Math.PI);
    ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=2; ctx.stroke();

    // Text
    for(let i=0;i<n;i++){
        const seg=wheelSegments[i], amid=i*arc-Math.PI/2+arc/2;
        const textR=R*0.70, tx=textR*Math.cos(amid), ty=textR*Math.sin(amid);
        const na=((amid%(2*Math.PI))+(2*Math.PI))%(2*Math.PI);
        const isBottom=na>Math.PI/2 && na<Math.PI*1.5;
        const textAngle=isBottom ? amid-Math.PI/2 : amid+Math.PI/2;
        ctx.save(); ctx.translate(tx,ty); ctx.rotate(textAngle);
        ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillStyle=seg.fg;
        const label=seg.label;
        // Use emoji or text
        if(label==='💀'||label==='😵'){
            ctx.font='28px sans-serif'; ctx.fillText(label,0,0);
        } else {
            const fs=label.length>4?20:label.length>3?24:28;
            ctx.font=`bold ${fs}px 'Creepster',cursive`; ctx.fillText(label,0,0);
        }
        ctx.restore();
    }

    // Neon outer ring
    ctx.beginPath(); ctx.arc(0,0,R+8,0,2*Math.PI);
    ctx.strokeStyle='#0080FF'; ctx.lineWidth=8; ctx.stroke();
    ctx.beginPath(); ctx.arc(0,0,R+13,0,2*Math.PI);
    ctx.strokeStyle='rgba(0,200,255,0.4)'; ctx.lineWidth=2; ctx.stroke();
    // Pegs
    for(let i=0;i<n;i++){
        const pa=i*arc-Math.PI/2;
        ctx.beginPath(); ctx.arc(Math.cos(pa)*(R+8),Math.sin(pa)*(R+8),5,0,2*Math.PI);
        ctx.fillStyle='#FF6EC7'; ctx.fill(); ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=1; ctx.stroke();
    }
    ctx.beginPath(); ctx.arc(0,0,35,0,2*Math.PI); ctx.fillStyle='var(--bg-dark)'; ctx.fill();
    ctx.restore();
}

// ═══ SPIN ═══
function spinWheel(){
    if(isSpinning||gamePhase==='picking')return;
    isSpinning=true; gamePhase='spinning'; disableActions();
    show('spinResultValue',''); show('spinResultLabel','Spinning...');
    document.getElementById('wheelCanvas').classList.add('spinning');
    const n=wheelSegments.length, arc=2*Math.PI/n;
    const target=wheelAngle+(5+Math.random()*4)*2*Math.PI+Math.random()*2*Math.PI;
    const t0=performance.now(), dur=4000+Math.random()*1500;
    function anim(now){
        const p=Math.min((now-t0)/dur,1), e=1-Math.pow(1-p,3);
        drawWheel(wheelAngle+(target-wheelAngle)*e);
        if(p<1)requestAnimationFrame(anim);
        else{
            wheelAngle=target%(2*Math.PI); isSpinning=false;
            document.getElementById('wheelCanvas').classList.remove('spinning');
            const pa=((2*Math.PI)-(wheelAngle%(2*Math.PI)))%(2*Math.PI);
            onSpinResult(wheelSegments[Math.floor(pa/arc)%n]);
        }
    }
    requestAnimationFrame(anim);
}
function onSpinResult(seg){
    if(seg.value===-1){
        show('spinResultValue','💀 BANKRUPT!'); show('spinResultLabel','All gone!');
        showToast('💀 BANKRUPT!',`${players[currentPlayerIdx].name} loses $${players[currentPlayerIdx].roundScore}!`);
        players[currentPlayerIdx].roundScore=0; updateScoreboard(); setTimeout(()=>nextPlayer(),2200);
    } else if(seg.value===-2){
        show('spinResultValue','😵 LOSE A TURN'); show('spinResultLabel','');
        showToast('😵 LOSE A TURN','Oof!'); setTimeout(()=>nextPlayer(),2200);
    } else {
        currentSpinValue=seg.value; gamePhase='spun';
        show('spinResultValue',`$${seg.value}`); show('spinResultLabel','per consonant — Pick a letter!');
        showConsonantPicker();
    }
}

function updateLetterBtns(mode){
    for(let c=65;c<=90;c++){
        const L=String.fromCharCode(c), btn=document.getElementById(`lbtn_${L}`);
        if(guessedLetters.has(L))btn.disabled=true;
        else if(mode==='consonant')btn.disabled=VOWELS.has(L);
        else if(mode==='vowel')btn.disabled=!VOWELS.has(L);
        else btn.disabled=false;
    }
}
function pickLetter(L){
    if(guessedLetters.has(L))return;
    guessedLetters.add(L);
    document.getElementById(`lbtn_${L}`).disabled=true;
    document.getElementById('letterPicker').classList.remove('active');
    const ct=[...currentPuzzle.answer.toUpperCase()].filter(ch=>ch===L).length;

        guessedResults[L]='hit'; revealLetterOnBoard(L);
        if(VOWELS.has(L))showToast(`${L}!`,`${ct} found! Nice! 🎉`);
        else{const earn=ct*currentSpinValue; players[currentPlayerIdx].roundScore+=earn;
            showToast(`${L}!`,`${ct} × $${currentSpinValue} = +$${earn} 🤑`);}

        if(isPuzzleSolved()){setTimeout(()=>solvePuzzle(true),1500);return;}
        const vowelsOnly = checkVowelWarning();
        setTimeout(()=>{gamePhase='idle';enableActions();},1200);
    } else {
        guessedResults[L]='miss'; updateUsedLetters(); checkVowelWarning();
        showToast(`No ${L}'s 😬`,'Turn passes...'); setTimeout(()=>nextPlayer(),1800);
    }
}

// ═══ BOARD ═══
function layoutPuzzle(ans){
    const words=ans.split(' '), rows=[]; let row=[], len=0;
    words.forEach(w=>{
        if(len+(len>0?1:0)+w.length>MAX_COLS){rows.push(row);row=[];len=0;}
        if(len>0){row.push(' ');len++;}
        for(const ch of w)row.push(ch); len+=w.length;
    });
    if(row.length)rows.push(row);
    return rows.map(r=>{
        const pad=MAX_COLS-r.length, left=Math.floor(pad/2), out=[];
        for(let i=0;i<left;i++)out.push(null); out.push(...r);
        while(out.length<MAX_COLS)out.push(null); return out;
    });
}
function renderBoard(){
    const b=document.getElementById('puzzleBoard'); b.innerHTML='';
    layoutPuzzle(currentPuzzle.answer).forEach((row)=>{
        const rd=document.createElement('div'); rd.className='board-row';
        row.forEach(c=>{
            const t=document.createElement('div');
            if(c===null||c===' ')t.className='tile space';
            else{t.className='tile letter'; t.dataset.letter=c.toUpperCase(); t.textContent=c.toUpperCase();
                if(revealedLetters.has(c.toUpperCase()))t.classList.add('revealed');}
            rd.appendChild(t);
        }); b.appendChild(rd);
    });
}
function revealLetterOnBoard(L){
    revealedLetters.add(L);
    document.querySelectorAll(`.tile.letter[data-letter="${L}"]`).forEach((t,i)=>setTimeout(()=>t.classList.add('revealed'),i*180));
}
function revealAll(){
    [...new Set(currentPuzzle.answer.toUpperCase().replace(/ /g,''))].forEach(ch=>revealedLetters.add(ch));
    document.querySelectorAll('.tile.letter').forEach(t=>t.classList.add('revealed'));
}
function isPuzzleSolved(){ return[...currentPuzzle.answer.toUpperCase()].every(ch=>ch===' '||revealedLetters.has(ch)); }

function updateUsedLetters(){
    const bar=document.getElementById('usedLettersBar');
    bar.innerHTML='<span class="used-label">Used:</span>';
    [...guessedLetters].sort().forEach(L=>{
        const span=document.createElement('span');
        span.className='used-letter '+(guessedResults[L]||'miss');
        span.textContent=L; bar.appendChild(span);
    });
}

// ═══ ROUND FLOW ═══
function startNewRound(){
    roundNumber++; revealedLetters.clear(); guessedLetters.clear(); guessedResults={};
    currentSpinValue=0; gamePhase='idle'; players.forEach(p=>p.roundScore=0);
    let idx; do{idx=Math.floor(Math.random()*puzzles.length);}
    while(usedPuzzleIndices.includes(idx)&&usedPuzzleIndices.length<puzzles.length);
    usedPuzzleIndices.push(idx); currentPuzzle=puzzles[idx];
    document.getElementById('categoryLabel').textContent=currentPuzzle.category;
    renderBoard(); buildLetterPicker(); updateScoreboard(); updateUsedLetters(); enableActions();
    document.getElementById('vowelWarning').classList.remove('active');
    document.getElementById('roundBadge').textContent=`Round ${roundNumber}  •  ${puzzles.length-usedPuzzleIndices.length} puzzles left`;
    showRoundOverlay(`ROUND ${roundNumber}`,currentPuzzle.category,`Hint: ${currentPuzzle.hint}`);
}
function solvePuzzle(correct){
    if(!correct)return; revealAll();
    const w=players[currentPlayerIdx], earn=Math.max(w.roundScore,100);
    w.totalScore+=earn; gamePhase='solved'; disableActions();
    showToast(`🎉 ${w.name} WINS!`,`+$${earn} added! 🤑`,2800); updateScoreboard();
    setTimeout(()=>{
        if(roundNumber>=puzzles.length||usedPuzzleIndices.length>=puzzles.length)endGame();
        else startNewRound();
    },3500);
}
function nextPlayer(){
    currentPlayerIdx=(currentPlayerIdx+1)%players.length;
    gamePhase='idle'; currentSpinValue=0;
    show('spinResultValue',''); show('spinResultLabel','');
    document.getElementById('letterPicker').classList.remove('active');
    updateScoreboard(); enableActions();
}
function enableActions(){
    // Check if any consonants are left to guess
    let consonantsLeft = false;
    for(let c=65;c<=90;c++){
        const L=String.fromCharCode(c);
        if(!VOWELS.has(L) && !guessedLetters.has(L)){consonantsLeft=true;break;}
    }
    document.getElementById('btnSpin').disabled=!consonantsLeft;
    document.getElementById('btnVowel').disabled=players[currentPlayerIdx].roundScore<VOWEL_COST||[...'AEIOU'].every(v=>guessedLetters.has(v));
    document.getElementById('btnSolve').disabled=false;
    document.getElementById('turnName').textContent=`${players[currentPlayerIdx].name}'s Turn!`;
}
function disableActions(){
    document.getElementById('btnSpin').disabled=true; document.getElementById('btnVowel').disabled=true;
    document.getElementById('btnSolve').disabled=true; document.getElementById('letterPicker').classList.remove('active');
}

function showHint(){ if(currentPuzzle)showToast('💬 HINT',currentPuzzle.hint,2800); }
function skipPuzzle(){
    showConfirm('Skip this one? No points for anyone!',()=>{
        revealAll(); showToast('⏭ SKIPPED!',currentPuzzle.answer,2500);
        setTimeout(()=>{ if(usedPuzzleIndices.length>=puzzles.length)endGame(); else startNewRound(); },3000);
    });
}
function confirmResetRound(){ showConfirm('Reset this round?',()=>{roundNumber--;startNewRound();}); }
function confirmResetGame(){
    showConfirm('Start a whole new game?',()=>{
        usedPuzzleIndices=[];roundNumber=0;currentPlayerIdx=0;
        players.forEach(p=>{p.totalScore=0;p.roundScore=0;}); startNewRound();
    });
}
function endGame(){
    const sorted=[...players].sort((a,b)=>b.totalScore-a.totalScore);
    setTimeout(()=>{
        showRoundOverlay(`🏆 ${sorted[0].name.toUpperCase()} WINS! 🏆`,`Total: $${sorted[0].totalScore.toLocaleString()}`,'');
        document.getElementById('roundBtn').textContent='PLAY AGAIN! 🎡';
        document.getElementById('roundBtn').onclick=()=>{
            usedPuzzleIndices=[];roundNumber=0;currentPlayerIdx=0;
            players.forEach(p=>{p.totalScore=0;p.roundScore=0;});
            document.getElementById('roundBtn').textContent="LET'S GOOO!";
            document.getElementById('roundBtn').onclick=dismissRoundOverlay;
            dismissRoundOverlay(); startNewRound();
        };
    },500);
}

function updateScoreboard(){
    const sb=document.getElementById('scoreboard'); sb.innerHTML='';
    players.forEach((p,i)=>{
        const c=document.createElement('div');
        c.className='player-card'+(i===currentPlayerIdx?' active':'');
        c.innerHTML=`<div class="pname">${p.name}</div>
            <div class="pscore${p.roundScore<0?' negative':''}">$${p.roundScore.toLocaleString()}</div>
            <div class="round-score">Total: $${p.totalScore.toLocaleString()}</div>`;
        sb.appendChild(c);
    });
    const vb=document.getElementById('btnVowel');
    if(vb&&gamePhase!=='solved')vb.disabled=players[currentPlayerIdx].roundScore<VOWEL_COST||[...'AEIOU'].every(v=>guessedLetters.has(v));
}

function show(id,text){document.getElementById(id).textContent=text;}
function showToast(big,sub,dur=1800){
    const t=document.getElementById('toast'); show('toastBig',big); show('toastSub',sub);
    t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),dur);
}
function showRoundOverlay(title,sub,hint){ show('roundTitle',title); show('roundSub',sub); show('roundHint',hint||''); document.getElementById('roundOverlay').classList.add('active'); }
function dismissRoundOverlay(){ document.getElementById('roundOverlay').classList.remove('active'); }
function showConfirm(msg,onYes){ show('confirmMsg',msg); document.getElementById('confirmOverlay').classList.add('active'); document.getElementById('confirmYes').onclick=()=>{closeConfirm();onYes();}; }
function closeConfirm(){ document.getElementById('confirmOverlay').classList.remove('active'); }

function checkVowelWarning(){
    // Check if all remaining unguessed letters in the puzzle are vowels
    const answerLetters = new Set(currentPuzzle.answer.toUpperCase().replace(/ /g,''));
    const unrevealed = [...answerLetters].filter(ch=>!revealedLetters.has(ch));
    const onlyVowelsLeft = unrevealed.length > 0 && unrevealed.every(ch=>VOWELS.has(ch));
    // Also check if all consonants have been guessed (none available to pick)
    const consonantsAvailable = [];
    for(let c=65;c<=90;c++){
        const L=String.fromCharCode(c);
        if(!VOWELS.has(L) && !guessedLetters.has(L)) consonantsAvailable.push(L);
    }
    const showWarning = onlyVowelsLeft || consonantsAvailable.length === 0;
    document.getElementById('vowelWarning').classList.toggle('active', showWarning);
    return showWarning;
}

// ═══ KEYBOARD INPUT ═══
document.addEventListener('keydown', function(e){
    // Don't capture if solve overlay or any overlay is open
    if(document.getElementById('solveOverlay').classList.contains('active')) return;
    if(document.getElementById('roundOverlay').classList.contains('active')) return;
    if(document.getElementById('confirmOverlay').classList.contains('active')) return;
    if(isSpinning) return;

    const key = e.key.toUpperCase();
    if(key.length === 1 && key >= 'A' && key <= 'Z'){
        // Only process if letter picker is showing
        if(gamePhase === 'picking' && document.getElementById('letterPicker').classList.contains('active')){
            if(guessedLetters.has(key)) return;
            const btn = document.getElementById(`lbtn_${key}`);
            if(btn && !btn.disabled){
                pickLetter(key);
            }
        }
    }
});

initSetup(); drawWheel();
</script>
